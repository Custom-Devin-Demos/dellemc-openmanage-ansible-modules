---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: "Please define the following variables: idrac_ip, idrac_user
     and idrac_password."
  when: idrac_ip is not defined or idrac_user is not defined or
   idrac_password is not defined

- name: Invalid Delete VD scenarios
  block:
    - name: Fetch the best controller and  delete existing VDs
      ansible.builtin.include_tasks: >-
        "{{ role_path }}/tests/_fetch_controller_drives.yml"

    - name: Pre-requisite -> Create VDs
      ansible.builtin.include_tasks: _create_dhs_VD.yml

    - name: Fetch the newly created VDs ID
      ansible.builtin.include_tasks: _fetch_volume_details.yml
      vars:
        storage_controller_Id: "{{ storage_controller_id }}"

    - name: Create the dictionary
      ansible.builtin.set_fact:
        volume_name_list: >-
          {{
             volume_name_list | default([])  + [{'name': volume_id }]
          }}
      loop: "{{ volume_id_list }}"
      loop_control:
        loop_var: volume_id

    - name: Create the dictionary
      ansible.builtin.set_fact:
        volume_name_list: >-
          {{
            volume_name_list | default([])
            + [{'name': 'invalid_volume_name' }]
          }}

    - name: Invalid - Delete Operation when volumes parameter is not passed
      dellemc.openmanage.idrac_storage_volume:
        state: "delete"
      register: delete_result
      ignore_errors: true

    - name: Verify - Normal Mode - Delete Operation when volumes
       parameter is not passed
      ansible.builtin.assert:
        that:
          - not delete_result.changed
          - delete_result.failed
          - delete_result.msg == ('Virtual disk name is a required parameter
           for remove virtual disk operations.')

    - name: Invalid - Delete Operation when invalid time_to_wait
       is out of allowed higher range value
      dellemc.openmanage.idrac_storage_volume:
        state: "delete"
        volumes:
          - name: "{{ volume_name_list }}"
        time_to_wait: 3700
      register: delete_result
      ignore_errors: true

    - name: Verify - Normal Mode - Delete Operation when invalid time_to_wait
       is out of allowed higher range value
      ansible.builtin.assert:
        that:
          - not delete_result.changed
          - delete_result.failed
          - delete_result.msg == ('Time to wait value is invalid. Minimum
           value is 300 and Maximum is 3600 seconds.')

    - name: Invalid - Delete Operation when invalid time_to_wait
       is out of allowed lower range value
      dellemc.openmanage.idrac_storage_volume:
        state: "delete"
        volumes:
          - name: "{{ volume_name_list }}"
        time_to_wait: 200
      register: delete_result
      ignore_errors: true

    - name: Verify - Normal Mode - Delete Operation when invalid time_to_wait
       is out of allowed lower range value
      ansible.builtin.assert:
        that:
          - not delete_result.changed
          - delete_result.failed
          - delete_result.msg == ('Time to wait value is invalid. Minimum
           value is 300 and Maximum is 3600 seconds.')

    - name: Invalid - Delete Operation when invalid time_to_wait
       is passed with negative or zero value
      dellemc.openmanage.idrac_storage_volume:
        state: "delete"
        volumes:
          - name: "{{ volume_name_list }}"
        time_to_wait: -30
      register: delete_result
      ignore_errors: true

    - name: Verify - Normal Mode - Delete Operation when invalid time_to_wait
       is passed with negative or zero value
      ansible.builtin.assert:
        that:
          - not delete_result.changed
          - delete_result.failed
          - delete_result.msg == ('Time to wait value is invalid. Minimum
           value is 300 and Maximum is 3600 seconds.')

    - name: Invalid - Delete Operation when invalid volume information is passed
      dellemc.openmanage.idrac_storage_volume:
        state: "delete"
        volumes:
          - name: "invalid_volume_name"
      register: delete_result
      ignore_errors: true

    - name: Verify - Normal Mode - Delete Operation when invalid
       volume information is passed
      ansible.builtin.assert:
        that:
          - not delete_result.changed
          - delete_result.failed
          - "delete_result.msg == 'Unable to find the virtual disk.'"

    - name: Invalid [Check Mode]- Delete Operation when valid and invalid
       volume information is passed
      dellemc.openmanage.idrac_storage_volume:
        state: "delete"
        volumes: "{{ volume_name_list }}"
      check_mode: true
      register: check_delete_result
      ignore_errors: true

    - name: Verify [Check Mode] Delete Operation when valid and invalid
       volume information is passed
      ansible.builtin.assert:
        that:
          - check_delete_result.changed
          - "check_delete_result.msg == 'Changes found to commit!'"

    - name: Invalid - Delete Operation when valid and invalid volume
       information is passed
      dellemc.openmanage.idrac_storage_volume:
        state: "delete"
        volumes: "{{ volume_name_list }}"
      register: delete_result
      ignore_errors: true

    - name: Verify - Normal Mode - Delete Operation when valid and invalid
       volume information is passed
      ansible.builtin.assert:
        that:
          - delete_result.changed
          - delete_result.msg == (
            'Successfully completed the delete storage volume operation.')
          - "'storage_status' in delete_result"
          - delete_result.storage_status.Message == (
            'Successfully imported and applied Server Configuration Profile.')
          - "delete_result.storage_status.JobState == 'Completed'"
