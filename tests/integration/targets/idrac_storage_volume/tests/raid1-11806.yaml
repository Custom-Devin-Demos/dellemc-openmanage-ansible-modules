---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: "Please define the following variables: idrac_ip, idrac_user
     and idrac_password."
  when: idrac_ip is not defined or idrac_user is not defined or
   idrac_password is not defined

- name: RAID 1 with single volume and default values
  vars:
    volume_name_prefix: "test_volume_r"
    raid_type: "1"
    span_length: 2
    span_depth: 1
  block:
    - name: Fetch the best controller and  delete existing VDs
      ansible.builtin.include_tasks: >-
        "{{ role_path }}/tests/_fetch_controller_drives.yml"

    - name: Prerequisite - fail if RAID not supported for the controller
      ansible.builtin.fail:
        msg: "RAID {{ raid_type }} not supported for this controller"
      when: "'RAID{{ raid_type }}' not in storage_controller_dict.Raids"

    - name: Prerequisite - fail if not enough disk is found to create a volume
      ansible.builtin.fail:
        msg:
          "Physical disks are not sufficient to proceed with test case
           execution. Needs a minimum {{ (span_length * span_depth) }},
           but found {{ pd_mapping | length }}"
      when: (pd_mapping | length) < (span_length * span_depth)

    - name: Select the PDs
      ansible.builtin.set_fact:
        used_pds: >
          {{ (pd_mapping.keys() | list )[:(span_length * span_depth)] }}

    - name: Reset raid
      ansible.builtin.include_tasks: _reset_config.yml

    - name: Wait for a Minute
      ansible.builtin.pause:
        seconds: 60

    - name: Check mode - Create Raid {{ raid_type }}
      dellemc.openmanage.idrac_storage_volume: &raid_one
        state: "create"
        controller_id: "{{ storage_controller_id }}"
        volume_type: "RAID {{ raid_type }}"
        span_depth: "{{ span_depth }}"
        span_length: "{{ span_length }}"
        volumes:
          - name: "{{ volume_name_prefix }}{{ raid_type }}"
            drives:
              location: "{{ used_pds }}"
      check_mode: true
      register: check_mode_result

    - name: Verify - Check mode - Create RAID {{ raid_type }}
      ansible.builtin.assert:
        that:
          - check_mode_result.changed
          - "check_mode_result.msg == 'Changes found to commit!'"

    - name: Create Raid {{ raid_type }}
      dellemc.openmanage.idrac_storage_volume:
        <<: *raid_one
      register: result

    - name: Wait for {{ raid_settling_time }} seconds
      ansible.builtin.pause:
        seconds: "{{ raid_settling_time }}"
      when: result.changed

    - name: Verify single volume creation
      ansible.builtin.include_tasks: _single_volume_create_verify.yml
      vars:
        storage_volume_result: "{{ result }}"
        volume_dict:
          Name: "{{ volume_name_prefix }}{{ raid_type }}"
          RAIDType: "RAID{{ raid_type }}"
          StripeSize: "64KB"
          DiskCachePolicy: "Default"
          WriteCachePolicy: "WriteThrough"
          ReadCachePolicy: "NoReadAhead"
          SpanDepth: "{{ span_depth }}"
          SpanLength: "{{ span_length }}"
