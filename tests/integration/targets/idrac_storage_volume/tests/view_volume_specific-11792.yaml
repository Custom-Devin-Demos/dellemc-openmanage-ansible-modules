---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: "Please define the following variables: idrac_ip, idrac_user
     and idrac_password."
  when: idrac_ip is not defined or idrac_user is not defined or
   idrac_password is not defined

- name: View VD when both controller and volume information is passed
  block:
    - name: Fetch the best controller and  delete existing VDs
      ansible.builtin.include_tasks: >-
        "{{ role_path }}/tests/_fetch_controller_drives.yml"

    - name: Pre-requisite -> Create VDs
      ansible.builtin.include_tasks: _pre_req_delete_view.yml
      vars:
        controller_id_tc: "{{ storage_controller_id }}"

    - name: Fetch the newly created VDs ID
      ansible.builtin.include_tasks: _fetch_volume_details.yml
      vars:
        storage_controller_Id: "{{ storage_controller_id }}"

    - name: Fetch the created Volume ID
      ansible.builtin.set_fact:
        volume_list: "{{ volume_list | default([]) + [volume.Id] }}"
      loop: "{{ volumes.json.Members }}"
      loop_control:
        loop_var: volume
      no_log: true

    - name: Set the volume Id
      ansible.builtin.set_fact:
        volume_id: "{{ volume_list[0] }}"
      when: volume_id_list | length > 0

    - name: Fetch API Output
      ansible.builtin.include_tasks: _view_api_output.yml
      vars:
        odata: "@odata.id"

    - name: Keeping only VirtualDisk in the API Output
      ansible.builtin.set_fact:
        api_tmp_output: |
          {% set new_controller_dict = {} %}
          {% for key,value in api_final_output.items() %}
          {% set _ = new_controller_dict.update({
            key: value | ansible.utils.remove_keys(
              target=['Enclosure','ControllerSensor']
            )}) %}
          {% endfor %}
          {{ new_controller_dict }}
      no_log: true

    - name: Convert api_tmp_output string to dictionary
      ansible.builtin.set_fact:
        api_final_output: "{{ api_tmp_output | from_yaml }}"
      no_log: true

    - name: Only keep the controller and volumes in API Output
      ansible.builtin.set_fact:
        api_output: "{{ tmp_dict | from_yaml }}"
      vars:
        tmp_dict: |
          {% set new_controller_list = {} %}
          {% for key, value in api_final_output.items() %}
            {% if key == storage_controller_id %}
              {% if value['VirtualDisk'] is defined %}
                {% set _ = new_controller_list.update({
                  key: {'VirtualDisk': value['VirtualDisk']}}) %}
              {% else %}
                {% set _ = new_controller_list.update({key: {}}) %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ new_controller_list }}

    - name: Check mode - View Operation when both controller and volume
       information is passed
      dellemc.openmanage.idrac_storage_volume:
        controller_id: "{{ storage_controller_id }}"
        volume_id: "{{ volume_id }}"
        state: "view"
      check_mode: true
      register: check_mode_result

    - name: Verify - Check mode - View Operation when both controller and
        volume information is passed
      ansible.builtin.assert:
        that:
          - not check_mode_result.changed
          - check_mode_result.msg == (
              'Successfully completed the view storage volume operation.')
          - "'storage_status' in check_mode_result"

    - name: View Operation when both controller and volume information is passed
      dellemc.openmanage.idrac_storage_volume:
        controller_id: "{{ storage_controller_id }}"
        volume_id: "{{ volume_id }}"
        state: "view"
      register: view_result

    - name: Verify - Normal Mode - View Operation when both controller and
       volume information is passed
      ansible.builtin.assert:
        that:
          - not view_result.changed
          - view_result.msg == (
              'Successfully completed the view storage volume operation.')
          - "'storage_status' in view_result"

    - name: Verify View Output with the API Output
      ansible.builtin.assert:
        that:
          - view_result.storage_status.Message == api_output

  rescue:
    - name: View VD when both controller and volume information is passed
      ansible.builtin.fail:
        msg: "{{ view_result.msg }}"
