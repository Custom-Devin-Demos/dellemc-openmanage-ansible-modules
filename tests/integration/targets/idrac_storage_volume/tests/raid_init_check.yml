---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user
     and idrac_password.'
  when: idrac_ip is not defined or idrac_user is not defined or
   idrac_password is not defined

- name: Multiple raid types with multiple volumes
  vars:
    volume_name_prefix: "test_volume_r"
    first_raid: "5"
    second_raid: "6"
  block:
    - name: Prerequisite - fail if RAID not supported for the controller
      ansible.builtin.fail:
        msg: "RAID {{ item }} not supported for this controller"
      when: "'RAID{{ item }}' not in storage_controller_dict.Raids"
      loop: "{{ [first_raid, second_raid] }}"

    - name: Prerequisite - fail if not enough disk is found to create a volume
      ansible.builtin.fail:
        msg: >
         Physical disks are not sufficient to proceed with test case
         execution. Needs a minimum {{
          raid_data[first_raid]['min_pds'] + raid_data[second_raid]['min_pds']
          }}, but found {{ pd_mapping | length }}
      when: >
        (pd_mapping | length) <
        (raid_data[first_raid]['min_pds'] + raid_data[second_raid]['min_pds'])

    - name: Reset raid
      ansible.builtin.include_tasks: _reset_config.yml

    - name: Set the PDs
      ansible.builtin.set_fact:
        first_pds: >-
          {{
             (pd_mapping.keys() | list | sort
             )[:raid_data[first_raid]['min_pds']]
          }}
        second_pds: >-
          {{
            (pd_mapping.keys() | list | sort
            )[
              raid_data[first_raid]['min_pds']
              :raid_data[first_raid]['min_pds']
              + raid_data[second_raid]['min_pds']]
          }}

    - name: Check mode - Create multi raids
      dellemc.openmanage.idrac_storage_volume: &raid_init
        state: "create"
        controller_id: "{{ storage_controller_id }}"
        raid_init_operation: "Fast"
        volumes:
          - name: "{{ volume_name_prefix }}{{ first_raid }}"
            volume_type: "RAID {{ first_raid }}"
            drives:
              location: "{{ first_pds }}"
            span_depth: "{{ raid_data[first_raid]['depth'] | int }}"
            span_length: "{{ raid_data[first_raid]['length'] | int }}"
            raid_init_operation: "None"
          - name: "{{ volume_name_prefix }}{{ second_raid }}"
            volume_type: "RAID {{ second_raid }}"
            drives:
              id: "{{ second_pds | map('extract', pd_mapping) | list }}"
            span_depth: "{{ raid_data[second_raid]['depth'] }}"
            span_length: "{{ raid_data[second_raid]['length'] }}"
            raid_init_operation: "Fast"
      check_mode: true
      register: check_mode_result

    - name: Verify - Check mode - Create multi raids
      ansible.builtin.assert:
        that:
          - check_mode_result.changed
          - "check_mode_result.msg == 'Changes found to commit!'"

    - name: Create Raid multi raids
      dellemc.openmanage.idrac_storage_volume:
        <<: *raid_init
      register: multi_raid_result

    - name: Verify the multi raid creation
      ansible.builtin.assert:
        that:
          - multi_raid_result.changed
          - multi_raid_result.msg == (
              "Successfully completed the create storage volume operation.")
          - "'storage_status' in multi_raid_result"
          - multi_raid_result.storage_status.JobType == "ImportConfiguration"
          - multi_raid_result.storage_status.JobState == "Completed"
          - >
            multi_raid_result.storage_status | dict2items
            | selectattr('key', 'search', '@odata.') | list | length == 0

    - name: Wait for {{ raid_settling_time }} seconds
      ansible.builtin.pause:
        seconds: "{{ raid_settling_time }}"
      when: multi_raid_result.changed

    - name: Get the volume
      ansible.builtin.uri:
        url: "https://{{ idrac_ip | ansible.utils.ipwrap }}:{{ idrac_port }}\
          /redfish/v1/Systems/System.Embedded.1/Storage\
          /{{ storage_controller_id }}/Volumes?$expand=*($levels=1)"
        method: GET
        status_code: 200
      register: volumes

    - name: Assert only 2 volumes created
      ansible.builtin.assert:
        that:
          - volumes.json.Members | length == 2

    - name: Get the volumes to dict
      ansible.builtin.set_fact:
        volumes_dict: "{{ volumes.json.Members | rekey_on_member('Name') }}"

    - name: Verify the volumes
      ansible.builtin.assert:
        that:
          - "{{ volumes_dict.keys() | length == 2 }}"
          - >
            {{ volumes_dict.keys() | list | symmetric_difference([
               'test_volume_r'+first_raid, 'test_volume_r'+second_raid
               ]) | length == 0 }}
          - >
            {{ volumes_dict['test_volume_r'+first_raid].Oem.Dell
               .DellVirtualDisk.OperationName == 'None' }}
          - >
            {{ volumes_dict['test_volume_r'+second_raid].Oem.Dell
               .DellVirtualDisk.OperationName == 'Background Initialization' }}
          - >
            {{ volumes_dict['test_volume_r'+first_raid].RAIDType ==
               'RAID'+first_raid }}
          - >
            {{ volumes_dict['test_volume_r'+second_raid].RAIDType ==
               'RAID'+second_raid }}
          - >
            {{ volumes_dict['test_volume_r'+first_raid].Oem.Dell
               .DellVirtualDisk.SpanDepth == raid_data[first_raid]['depth'] }}
          - >
            {{ volumes_dict['test_volume_r'+second_raid].Oem.Dell
               .DellVirtualDisk.SpanDepth == raid_data[second_raid]['depth'] }}
          - >
            {{ volumes_dict['test_volume_r'+first_raid].Oem.Dell
               .DellVirtualDisk.SpanLength ==
               raid_data[first_raid]['length'] }}
          - >
            {{ volumes_dict['test_volume_r'+second_raid].Oem.Dell
               .DellVirtualDisk.SpanLength ==
               raid_data[second_raid]['length'] }}
          - >
            {{ volumes_dict['test_volume_r'+first_raid].Oem.Dell
               .DellVirtualDisk.RaidStatus == 'Online' }}
          - >
            {{ volumes_dict['test_volume_r'+second_raid].Oem.Dell
               .DellVirtualDisk.RaidStatus == 'Online' }}
