---
- block:
    - name: Get the volume
      ansible.builtin.uri:
        url: "https://{{ idrac_ip | ansible.utils.ipwrap }}:{{ idrac_port }}\
         /redfish/v1/Systems/System.Embedded.1/Storage\
         /{{ storage_controller_Id }}/Volumes?$expand=*($levels=1)"
        method: GET
        status_code: 200
      register: volumes
      no_log: true

    - name: Fetch the created Volume ID
      ansible.builtin.set_fact:
        volume_id_list: >-
          {{ volume_id_list | default([]) + [volume.DisplayName] }}
      loop: "{{ volumes.json.Members }}"
      loop_control:
        loop_var: volume
      no_log: true
