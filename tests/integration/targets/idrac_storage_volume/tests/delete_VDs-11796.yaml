---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: "Please define the following variables: idrac_ip, idrac_user
     and idrac_password."
  when: idrac_ip is not defined or idrac_user is not defined or
   idrac_password is not defined

- name: Delete VDs belonging to controller having DHS
  block:
    - name: Fetch the best controller and  delete existing VDs
      ansible.builtin.include_tasks: >-
        "{{ role_path }}/tests/_fetch_controller_drives.yml"

    - name: Pre-requisite -> Create VDs
      ansible.builtin.include_tasks: _create_dhs_VD.yml

    - name: Fetch the newly created VDs ID
      ansible.builtin.include_tasks: _fetch_volume_details.yml
      vars:
        storage_controller_Id: "{{ storage_controller_id }}"

    - name: Create the dictionary
      ansible.builtin.set_fact:
        volume_name_list: >-
          {{ volume_name_list | default([])  + [{'name': volume_id }] }}
      loop: "{{ volume_id_list }}"
      loop_control:
        loop_var: volume_id

    - name: Check Mode - Delete VD belonging to dhs
      dellemc.openmanage.idrac_storage_volume:
        state: "delete"
        volumes: "{{ volume_name_list }}"
        time_to_wait: 500
      check_mode: true
      register: check_mode_result

    - name: Verify - Check Mode- Delete VDs belonging to dhs
      ansible.builtin.assert:
        that:
          - check_mode_result.changed
          - "check_mode_result.msg == 'Changes found to commit!'"

    - name: Delete VDs belonging to dhs
      dellemc.openmanage.idrac_storage_volume:
        state: "delete"
        volumes: "{{ volume_name_list }}"
        time_to_wait: 500
      register: delete_result

    - name: Verify - Normal Mode -Delete VDs belonging to dhs
      ansible.builtin.assert:
        that:
          - delete_result.changed
          - delete_result.msg == (
            'Successfully completed the delete storage volume operation.')
          - "'storage_status' in delete_result"
          - delete_result.storage_status.Message == (
            'Successfully imported and applied Server Configuration Profile.')
          - "delete_result.storage_status.JobState == 'Completed'"

    - name: Wait for a Minute
      ansible.builtin.pause:
        seconds: 60
      when: delete_result.changed

