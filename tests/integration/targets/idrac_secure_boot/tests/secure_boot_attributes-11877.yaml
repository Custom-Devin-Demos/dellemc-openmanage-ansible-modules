---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined'

- block:
    - name: Get Model from iDRAC by going to Managers URI
      ansible.builtin.uri:
        url: "{{ idrac_manager_url }}?$select=Model"
        method: GET
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        return_content: true
        status_code: 200
        force_basic_auth: true
      register: idrac_model_response

    - name: Extract model from idrac_model_response
      ansible.builtin.set_fact:
        model_raw: "{{ idrac_model_response.json.Model }}"

    - name: Search for the Hardware model number in the model string
      ansible.builtin.set_fact:
        model_search: "{{ model_raw | regex_search('([0-9]+)G', '\\1') }}"

    - name: Extract the Hardware model number
      ansible.builtin.set_fact:
        hw_model: "{{ model_search | first }}"

    - name: Check if less than 17G
      ansible.builtin.set_fact:
        less_than_17G: "{{ hw_model | int < 17 }}"

    - name: debug iDRAC hardware model
      ansible.builtin.debug:
        var: hw_model

    - block:
        # this block of tests will only be executed for 16G and below
        - name: Pre-req - Set boot mode to Uefi
          dellemc.openmanage.idrac_secure_boot:
            idrac_ip: "{{ idrac_ip }}"
            idrac_user: "{{ idrac_user }}"
            idrac_password: "{{ idrac_password }}"
            boot_mode: Uefi
            validate_certs: false
            restart: true
            restart_type: GracefulRestart

        - name: Set boot mode to bios (check mode - changes expected)
          dellemc.openmanage.idrac_secure_boot: &boot_md_bios
            idrac_ip: "{{ idrac_ip }}"
            idrac_user: "{{ idrac_user }}"
            idrac_password: "{{ idrac_password }}"
            boot_mode: Bios
            validate_certs: false
            restart: true
            restart_type: GracefulRestart
          register: cm_changes
          check_mode: true

        - name: Verify - Set boot mode to bios (check mode - changes expected)
          ansible.builtin.assert:
            that:
              - cm_changes.changed
              - cm_changes.msg == 'Changes found to be applied.'

        - name: Set boot mode to bios (normal mode)
          dellemc.openmanage.idrac_secure_boot:
            <<: *boot_md_bios
          register: boot_md_bios

        - name: Verify - Set boot mode to bios (normal mode)
          ansible.builtin.assert:
            that:
              - boot_md_bios.changed
              - 'boot_md_bios.msg == sboot_smsg'

        - name: Wait for iDRAC
          ansible.builtin.pause:
            seconds: 80

        - name: Get details by uri.
          ansible.builtin.uri:
            url: "{{ idrac_bios_url }}"
            user: "{{ idrac_user }}"
            password: "{{ idrac_password }}"
            validate_certs: false
            status_code: 200
          retries: 10
          delay: 20
          until: "'BootMode' in boot_md_uri.json.Attributes"
          register: boot_md_uri

        - name: Verify -  Get details by uri.
          ansible.builtin.assert:
            that:
              - boot_md_bios.changed
              - 'boot_md_uri.json.Attributes.BootMode == "Bios"'

        - name: Set boot mode to Uefi (check mode - changes expected)
          dellemc.openmanage.idrac_secure_boot: &boot_md_uefi
            idrac_ip: "{{ idrac_ip }}"
            idrac_user: "{{ idrac_user }}"
            idrac_password: "{{ idrac_password }}"
            validate_certs: false
            boot_mode: Uefi
            restart: true
            restart_type: GracefulRestart
          register: cm_changes
          check_mode: true

        - name: Verify - Set boot mode to Uefi (check mode - changes expected)
          ansible.builtin.assert:
            that:
              - cm_changes.changed
              - cm_changes.msg == 'Changes found to be applied.'

        - ansible.builtin.include_role:
            name: prepare_idrac_lifecycle_controller_status

        - name: Set boot mode to Uefi (normal mode)
          dellemc.openmanage.idrac_secure_boot:
            <<: *boot_md_uefi
          register: boot_md_uefi

        - name: Verify - Set boot mode to Uefi (normal mode)
          ansible.builtin.assert:
            that:
              - boot_md_uefi.changed
              - 'boot_md_uefi.msg == sboot_smsg'

        - name: Wait for iDRAC
          ansible.builtin.pause:
            seconds: 30

        - name: Get details by uri.
          ansible.builtin.uri:
            url: "{{ idrac_bios_url }}"
            user: "{{ idrac_user }}"
            password: "{{ idrac_password }}"
            validate_certs: false
            status_code: 200
          retries: 10
          delay: 20
          until: "'BootMode' in boot_md_uri.json.Attributes"
          register: boot_md_uri

        - name: Verify -  Get details by uri.
          ansible.builtin.assert:
            that:
              - boot_md_uefi.changed
              - 'boot_md_uri.json.Attributes.BootMode == "Uefi"'

        - ansible.builtin.include_role:
            name: prepare_idrac_lifecycle_controller_status

      when: less_than_17G

    - name: Pre-req - Disable secure boot
      dellemc.openmanage.idrac_secure_boot:
        idrac_ip: "{{ idrac_ip }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        secure_boot: Disabled
        validate_certs: false
        force_int_10: "{{ less_than_17G | ternary('Disabled', omit) }}"
        restart: true
        restart_type: GracefulRestart

    - name: Enable secure boot (check mode - changes expected)
      dellemc.openmanage.idrac_secure_boot: &secure_boot_enable
        idrac_ip: "{{ idrac_ip }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        secure_boot: Enabled
        validate_certs: false
        force_int_10: "{{ less_than_17G | ternary('Disabled', omit) }}"
        restart: true
        restart_type: GracefulRestart
      register: cm_changes
      check_mode: true

    - name: Verify - Enable secure boot (check mode - changes expected)
      ansible.builtin.assert:
        that:
          - cm_changes.changed
          - cm_changes.msg == 'Changes found to be applied.'

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - name: Enable secure boot (normal mode)
      dellemc.openmanage.idrac_secure_boot:
        <<: *secure_boot_enable
      register: secure_boot_enable

    - name: Verify - Enable secure boot(normal mode)
      ansible.builtin.assert:
        that:
          - secure_boot_enable.changed
          - 'secure_boot_enable.msg == sboot_smsg'
      when: secure_boot_enable.changed

    - name: Wait for iDRAC
      ansible.builtin.pause:
        seconds: 60

    - name: Get details by uri.
      ansible.builtin.uri:
        url: "{{ idrac_bios_url }}"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        status_code: 200
      retries: 10
      delay: 20
      until: "'SecureBoot' in boot_md_uri.json.Attributes"
      register: boot_md_uri

    - name: Verify -  Get details by uri.
      ansible.builtin.assert:
        that:
          - secure_boot_enable.changed
          - 'boot_md_uri.json.Attributes.SecureBoot == "Enabled"'
      when: secure_boot_enable.changed

    - name: Disable secure boot (check mode - changes expected)
      dellemc.openmanage.idrac_secure_boot: &secure_boot_disable
        idrac_ip: "{{ idrac_ip }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        secure_boot: Disabled
        validate_certs: false
        restart: true
        restart_type: GracefulRestart
      register: cm_changes
      check_mode: true

    - name: Verify - Disable secure boot (check mode - changes expected)
      ansible.builtin.assert:
        that:
          - cm_changes.changed
          - cm_changes.msg == 'Changes found to be applied.'

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - name: Disable secure boot (normal mode)
      dellemc.openmanage.idrac_secure_boot:
        <<: *secure_boot_disable
      register: secure_boot_disable

    - name: Verify - Disable secure boot(normal mode)
      ansible.builtin.assert:
        that:
          - secure_boot_disable.changed
          - 'secure_boot_disable.msg == sboot_smsg'

    - name: Wait for iDRAC
      ansible.builtin.pause:
        seconds: 60

    - name: Get details by uri.
      ansible.builtin.uri:
        url: "{{ idrac_bios_url }}"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        status_code: 200
      retries: 10
      delay: 20
      until: "'SecureBoot' in boot_md_uri.json.Attributes"
      register: boot_md_uri

    - name: Verify -  Get details by uri.
      ansible.builtin.assert:
        that:
          - secure_boot_disable.changed
          - 'boot_md_uri.json.Attributes.SecureBoot == "Disabled"'

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - name: Pre-req - Set secure boot mode to DeployedMode
      dellemc.openmanage.idrac_secure_boot:
        idrac_ip: "{{ idrac_ip }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        secure_boot_mode: DeployedMode
        validate_certs: false
        restart: true
        restart_type: GracefulRestart

    - name: Set secure boot mode to UserMode (check mode - changes expected)
      dellemc.openmanage.idrac_secure_boot: &secure_boot_mode_user
        idrac_ip: "{{ idrac_ip }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        secure_boot_mode: UserMode
        validate_certs: false
        restart: true
        restart_type: GracefulRestart
      register: cm_changes
      check_mode: true

    - name: Verify - Enable secure boot (check mode - changes expected)
      ansible.builtin.assert:
        that:
          - cm_changes.changed
          - cm_changes.msg == 'Changes found to be applied.'

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - name: Set secure boot mode to UserMode (normal mode)
      dellemc.openmanage.idrac_secure_boot:
        <<: *secure_boot_mode_user
      register: secure_boot_mode_user

    - name: Verify - Set secure boot mode to UserMode(normal mode)
      ansible.builtin.assert:
        that:
          - secure_boot_mode_user.changed
          - 'secure_boot_mode_user.msg == sboot_smsg'
      when: secure_boot_mode_user.changed

    - name: Wait for iDRAC
      ansible.builtin.pause:
        seconds: 60

    - name: Get details by uri.
      ansible.builtin.uri:
        url: "{{ idrac_bios_url }}"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        status_code: 200
      retries: 10
      delay: 20
      until: "'SecureBootMode' in boot_md_uri.json.Attributes"
      register: boot_md_uri

    - name: Verify -  Get details by uri.
      ansible.builtin.assert:
        that:
          - secure_boot_mode_user.changed
          - 'boot_md_uri.json.Attributes.SecureBootMode == "UserMode"'
      when: secure_boot_mode_user.changed

    - name: Set secure boot mode to DeployedMode (check mode - changes expected)
      dellemc.openmanage.idrac_secure_boot: &secure_boot_mode_deployed
        idrac_ip: "{{ idrac_ip }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        secure_boot_mode: DeployedMode
        validate_certs: false
        restart: true
        restart_type: GracefulRestart
      register: cm_changes
      check_mode: true

    - name: 'Verify - Set secure boot mode to DeployedMode
       (check mode - changes expected)'
      ansible.builtin.assert:
        that:
          - cm_changes.changed
          - cm_changes.msg == 'Changes found to be applied.'

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - name: Set secure boot mode to DeployedMode (normal mode)
      dellemc.openmanage.idrac_secure_boot:
        <<: *secure_boot_mode_deployed
      register: secure_boot_mode_deployed

    - name: Verify - Set secure boot mode to DeployedMode (normal mode)
      ansible.builtin.assert:
        that:
          - secure_boot_mode_deployed.changed
          - 'secure_boot_mode_deployed.msg == sboot_smsg'
      when: secure_boot_mode_deployed.changed

    - name: Wait for iDRAC
      ansible.builtin.pause:
        seconds: 60

    - name: Get details by uri.
      ansible.builtin.uri:
        url: "{{ idrac_bios_url }}"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        status_code: 200
      retries: 10
      delay: 20
      until: "'SecureBootMode' in boot_md_uri.json.Attributes"
      register: boot_md_uri

    - name: Verify -  Get details by uri.
      ansible.builtin.assert:
        that:
          - secure_boot_mode_deployed.changed
          - 'boot_md_uri.json.Attributes.SecureBootMode == "DeployedMode"'
      when: secure_boot_mode_deployed.changed

    - ansible.builtin.include_tasks: _create_directory.yml

    - name: Export platform key policy certificate
      dellemc.openmanage.idrac_secure_boot:
        export_certificates: true
        platform_key: "{{ path_for_secure_boot_certificate }}/pk"
        restart: true
        restart_type: GracefulRestart
        job_wait: true
        job_wait_timeout: 1000

    - name: Wait for a minutes
      ansible.builtin.pause:
        minutes: 1

    - ansible.builtin.include_tasks: _get_file_path.yml

    - name: Verify - PK is present on filesystem
      ansible.builtin.assert:
        that:
          - pk_files.files|length > 0

    - name: Delete pk
      dellemc.openmanage.idrac_secure_boot:
        idrac_ip: "{{ idrac_ip }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        validate_certs: false
        reset_keys: "DeletePK"

    - name: Restart iDRAC
      dellemc.openmanage.redfish_powerstate:
        baseuri: "{{ idrac_ip }}"
        username: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        reset_type: "ForceRestart"

    - name: Wait for port to become open on the host
      ansible.builtin.wait_for:
        host: "{{ idrac_ip }}"
        port: "{{ idrac_port }}"
        delay: 30
        connect_timeout: 5
        timeout: 500
      register: result
      failed_when: result.elapsed < 20

    - name: Wait for iDRAC
      ansible.builtin.pause:
        seconds: 300

    - name: Set secure boot mode to AuditMode (check mode - changes expected)
      dellemc.openmanage.idrac_secure_boot: &secure_boot_mode_audit
        idrac_ip: "{{ idrac_ip }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        secure_boot_mode: AuditMode
        validate_certs: false
        restart: true
        restart_type: GracefulRestart
      register: cm_changes
      check_mode: true

    - name: 'Verify - Set secure boot mode to AuditMode
       (check mode - changes expected)'
      ansible.builtin.assert:
        that:
          - cm_changes.changed
          - cm_changes.msg == 'Changes found to be applied.'

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - name: Set secure boot mode to AuditMode (normal mode)
      dellemc.openmanage.idrac_secure_boot:
        <<: *secure_boot_mode_audit
      register: secure_boot_mode_audit

    - name: Verify - Set secure boot mode to AuditMode (normal mode)
      ansible.builtin.assert:
        that:
          - secure_boot_mode_audit.changed
          - 'secure_boot_mode_audit.msg == sboot_smsg'

    - name: Wait for iDRAC
      ansible.builtin.pause:
        seconds: 60

    - name: Get details by uri.
      ansible.builtin.uri:
        url: "{{ idrac_bios_url }}"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        status_code: 200
      retries: 10
      delay: 20
      until: "'SecureBootMode' in boot_md_uri.json.Attributes"
      register: boot_md_uri

    - name: Verify -  Get details by uri.
      ansible.builtin.assert:
        that:
          - secure_boot_mode_audit.changed
          - 'boot_md_uri.json.Attributes.SecureBootMode == "AuditMode"'

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - name: Import platform key policy certificate back
      dellemc.openmanage.idrac_secure_boot:
        import_certificates: true
        platform_key: "{{ pk_files.files[0].path }}"
        restart: true
        restart_type: GracefulRestart
        job_wait: true
        job_wait_timeout: 1000

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - name: Wait for iDRAC
      ansible.builtin.pause:
        seconds: 60

    - name: Pre-req - Set secure boot policy to Custom
      dellemc.openmanage.idrac_secure_boot:
        idrac_ip: "{{ idrac_ip }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        secure_boot_policy: Custom
        validate_certs: false
        restart: true
        restart_type: GracefulRestart

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - name: Wait for iDRAC
      ansible.builtin.pause:
        seconds: 60

    - name: Set secure boot policy to Standard (check mode - changes expected)
      dellemc.openmanage.idrac_secure_boot: &secure_boot_policy_standard
        idrac_ip: "{{ idrac_ip }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        secure_boot_policy: Standard
        validate_certs: false
        restart: true
        restart_type: GracefulRestart
      register: cm_changes
      check_mode: true

    - name: 'Verify - Set secure boot policy to Standard
       (check mode - changes expected)'
      ansible.builtin.assert:
        that:
          - cm_changes.changed
          - cm_changes.msg == 'Changes found to be applied.'
      when: cm_changes.changed

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - name: Set secure boot policy to Standard (normal mode)
      dellemc.openmanage.idrac_secure_boot:
        <<: *secure_boot_policy_standard
      register: secure_boot_policy_standard

    - name: Verify - Set secure boot policy to Standard (normal mode)
      ansible.builtin.assert:
        that:
          - secure_boot_policy_standard.changed
          - 'secure_boot_policy_standard.msg == sboot_smsg'
      when: secure_boot_policy_standard.changed

    - name: Wait for iDRAC
      ansible.builtin.pause:
        seconds: 60

    - name: Get details by uri.
      ansible.builtin.uri:
        url: "{{ idrac_bios_url }}"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        status_code: 200
      retries: 10
      delay: 20
      until: "'SecureBootPolicy' in boot_md_uri.json.Attributes"
      register: boot_md_uri

    - name: Verify -  Get details by uri.
      ansible.builtin.assert:
        that:
          - secure_boot_policy_standard.changed
          - 'boot_md_uri.json.Attributes.SecureBootPolicy == "Standard"'
      when: secure_boot_policy_standard.changed

    - name: Set secure boot policy to Custom (check mode - changes expected)
      dellemc.openmanage.idrac_secure_boot: &secure_boot_policy_custom
        idrac_ip: "{{ idrac_ip }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        secure_boot_policy: Custom
        validate_certs: false
        restart: true
        restart_type: GracefulRestart
      register: cm_changes
      check_mode: true

    - name: 'Verify - Set secure boot policy to Custom
       (check mode - changes expected)'
      ansible.builtin.assert:
        that:
          - cm_changes.changed
          - cm_changes.msg == 'Changes found to be applied.'
      when: cm_changes.changed

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - name: Set secure boot policy to Custom (normal mode)
      dellemc.openmanage.idrac_secure_boot:
        <<: *secure_boot_policy_custom
      register: secure_boot_policy_custom

    - name: Verify - Set secure boot policy to Custom (normal mode)
      ansible.builtin.assert:
        that:
          - secure_boot_policy_custom.changed
          - 'secure_boot_policy_custom.msg == sboot_smsg'
      when: secure_boot_policy_custom.changed

    - name: Wait for iDRAC
      ansible.builtin.pause:
        seconds: 60

    - name: Get details by uri.
      ansible.builtin.uri:
        url: "{{ idrac_bios_url }}"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        status_code: 200
      retries: 10
      delay: 20
      until: "'SecureBootPolicy' in boot_md_uri.json.Attributes"
      register: boot_md_uri

    - name: Verify -  Get details by uri.
      ansible.builtin.assert:
        that:
          - secure_boot_policy_custom.changed
          - 'boot_md_uri.json.Attributes.SecureBootPolicy == "Custom"'
      when: secure_boot_policy_custom.changed

    - ansible.builtin.include_role:
        name: prepare_idrac_lifecycle_controller_status

    - block:
        # this block of tests will only be executed for 16G and below
        # this block of tests are related to force_int_10
        - name: Pre-req - Disable force_int_10
          dellemc.openmanage.idrac_secure_boot:
            idrac_ip: "{{ idrac_ip }}"
            idrac_user: "{{ idrac_user }}"
            idrac_password: "{{ idrac_password }}"
            force_int_10: Disabled
            validate_certs: false
            restart: true
            restart_type: GracefulRestart

        - name: Enable force_int_10 (check mode - changes expected)
          dellemc.openmanage.idrac_secure_boot: &force_enabled
            idrac_ip: "{{ idrac_ip }}"
            idrac_user: "{{ idrac_user }}"
            idrac_password: "{{ idrac_password }}"
            force_int_10: Enabled
            validate_certs: false
            restart: true
            restart_type: GracefulRestart
          register: cm_changes
          check_mode: true

        - name: Verify - Enable force_int_10 (check mode - changes expected)
          ansible.builtin.assert:
            that:
              - cm_changes.changed
              - cm_changes.msg == 'Changes found to be applied.'

        - ansible.builtin.include_role:
            name: prepare_idrac_lifecycle_controller_status

        - name: Enable force_int_10 (normal mode)
          dellemc.openmanage.idrac_secure_boot:
            <<: *force_enabled
          register: force_enabled

        - name: Verify - Enable force_int_10 (normal mode)
          ansible.builtin.assert:
            that:
              - force_enabled.changed
              - 'force_enabled.msg == sboot_smsg'

        - name: Wait for iDRAC
          ansible.builtin.pause:
            seconds: 30

        - name: Get details by uri.
          ansible.builtin.uri:
            url: "{{ idrac_bios_url }}"
            user: "{{ idrac_user }}"
            password: "{{ idrac_password }}"
            validate_certs: false
            status_code: 200
          retries: 10
          delay: 20
          until: "'ForceInt10' in boot_md_uri.json.Attributes"
          register: boot_md_uri

        - name: Verify -  Get details by uri.
          ansible.builtin.assert:
            that:
              - force_enabled.changed
              - 'boot_md_uri.json.Attributes.ForceInt10 == "Enabled"'

        - name: Disable force_int_10 (check mode - changes expected)
          dellemc.openmanage.idrac_secure_boot: &force_disbled
            idrac_ip: "{{ idrac_ip }}"
            idrac_user: "{{ idrac_user }}"
            idrac_password: "{{ idrac_password }}"
            force_int_10: Disabled
            validate_certs: false
            restart: true
            restart_type: GracefulRestart
          register: cm_changes
          check_mode: true

        - name: Verify - Disable force_int_10 (check mode - changes expected)
          ansible.builtin.assert:
            that:
              - cm_changes.changed
              - cm_changes.msg == 'Changes found to be applied.'

        - ansible.builtin.include_role:
            name: prepare_idrac_lifecycle_controller_status

        - name: Disable force_int_10 (normal mode)
          dellemc.openmanage.idrac_secure_boot:
            <<: *force_disbled
          register: force_disbled

        - name: Verify - Disable force_int_10 (normal mode)
          ansible.builtin.assert:
            that:
              - force_disbled.changed
              - force_disbled.msg == sboot_smsg

        - name: Wait for iDRAC
          ansible.builtin.pause:
            seconds: 30

        - name: Get details by uri.
          ansible.builtin.uri:
            url: "{{ idrac_bios_url }}"
            user: "{{ idrac_user }}"
            password: "{{ idrac_password }}"
            validate_certs: false
            status_code: 200
          retries: 10
          delay: 20
          until: "'ForceInt10' in boot_md_uri.json.Attributes"
          register: boot_md_uri

        - name: Verify -  Get details by uri.
          ansible.builtin.assert:
            that:
              - force_disbled.changed
              - 'boot_md_uri.json.Attributes.ForceInt10 == "Disabled"'

      when: less_than_17G

  always:
    - name: Cleanup
      ansible.builtin.include_tasks: _delete_directory.yml

  module_defaults:
    dellemc.openmanage.idrac_secure_boot:
      idrac_ip: "{{ idrac_ip | ansible.utils.ipwrap }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"

  vars:
    ip_wrapped: "{{ idrac_ip | ansible.utils.ipwrap }}"
    endpt: "https://{{ ip_wrapped }}:{{ idrac_port }}"
    idrac_manager_uri: "redfish/v1/Managers/iDRAC.Embedded.1"
    idrac_manager_url: "{{ endpt }}/{{ idrac_manager_uri }}"
    idrac_bios_uri: "redfish/v1/Systems/System.Embedded.1/Bios"
    idrac_bios_url: "{{ endpt }}/{{ idrac_bios_uri }}"
    sboot_smsg: 'Successfully updated the iDRAC Secure Boot settings.'
