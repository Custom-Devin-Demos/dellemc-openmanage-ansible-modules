---
- name: Perform graceful restart of the device
  dellemc.openmanage.redfish_powerstate:
    baseuri: "{{ idrac_ip|ansible.utils.ipwrap }}:{{ idrac_port }}"
    username: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    validate_certs: "{{ validate_certs }}"
    reset_type: ForceRestart

- ansible.builtin.wait_for: timeout=60

- include_role: name=prepare_idrac_lifecycle_controller_status

- include_role: name=prepare_lifecycle_controller_job
