---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined

- name: Set prerequisite
  ansible.builtin.include_tasks: _helper.yml

- name: Set prerequisite
  ansible.builtin.include_tasks: _prereq_configure_oem_network_attributes.yml
  vars:
    module_apply_time: "Immediate"

- block:
    - name: Pre-req - Configure network attributes
      dellemc.openmanage.idrac_network_attributes:
        network_adapter_id: "{{ inp_network_adapter_id }}"
        network_device_function_id: "{{ inp_network_device_function_id }}"
        oem_network_attributes:
          PermitTotalPortShutdown: "Disabled"
        apply_time: OnReset

    - name: Clear pending attributes (Check mode - Changes expected)
      dellemc.openmanage.idrac_network_attributes: &clear_pending_attributes
        network_adapter_id: "{{ inp_network_adapter_id }}"
        network_device_function_id: "{{ inp_network_device_function_id }}"
        apply_time: Immediate
        clear_pending: true
      register: check_clear_pending_attributes
      check_mode: true

    - name: Verify task status - Clear pending attributes
        (Check mode - Changes expected)
      ansible.builtin.assert:
        that:
          - check_clear_pending_attributes.changed
          - 'check_clear_pending_attributes.msg == "Changes found to be
           applied."'

    - name: Clear pending attributes
      dellemc.openmanage.idrac_network_attributes:
        <<: *clear_pending_attributes
      register: result_clear_pending_attributes

    - name: Verify task status - Clear pending attributes
      ansible.builtin.assert:
        that:
          - result_clear_pending_attributes.changed
          - 'result_clear_pending_attributes.msg == "Successfully cleared the
           pending network attributes."'

    - name: Clear pending attributes (Idempotence)
      dellemc.openmanage.idrac_network_attributes:
        <<: *clear_pending_attributes
      register: idempotence_clear_pending_attributes

    - name: Verify task status - Clear pending attributes (Idempotence)
      ansible.builtin.assert:
        that:
          - not idempotence_clear_pending_attributes.changed
          - 'idempotence_clear_pending_attributes.msg == "No changes found to be
           applied."'

  module_defaults:
    dellemc.openmanage.idrac_network_attributes:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
      idrac_port: "{{ idrac_port }}"
