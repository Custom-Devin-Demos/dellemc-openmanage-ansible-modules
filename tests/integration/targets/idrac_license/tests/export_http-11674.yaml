---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user
     and idrac_password.'
  when: idrac_ip is not defined or idrac_user is not defined or
   idrac_password is not defined

- name: Export License http share all cases without proxy.
  ansible.builtin.include_tasks: _export_http.yml
  vars:
    export_http_proxy_support: "off"
    export_http_proxy_type: "{{ omit }}"
    export_http_proxy_server: "{{ omit }}"
    export_http_proxy_port: "{{ omit }}"
    export_http_proxy_username: "{{ omit }}"
    export_http_proxy_password: "{{ omit }}"
