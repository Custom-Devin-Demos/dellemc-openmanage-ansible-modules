---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user
     and idrac_password.'
  when: idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined

- block:
    - name: Include the helper task
      ansible.builtin.include_tasks: _helper.yml

    - name: Create Directory
      ansible.builtin.file:
        path: "{{ base_path_for_exported_license }}"
        state: directory
      no_log: true
      delegate_to: localhost
      register: created_directory

    - name: Set the API
      ansible.builtin.set_fact:
        idracApi: "/redfish/v1/Managers/iDRAC.Embedded.1/Oem/Dell\
         /DellLicenseManagementService/Actions\
         /DellLicenseManagementService.ExportLicense"

    - name: Create Export license for IDRAC component by uri.
      ansible.builtin.uri:
        url: "https://{{ idrac_ip | ansible.utils.ipwrap }}:{{ idrac_port }}\
         {{ idracApi }}"
        method: POST
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        body:
          EntitlementID: "{{ idrac_license_id }}"
        body_format: json
        status_code: 200
        headers: 'Accept=application/json'
      register: uri_license_content
      no_log: false

    - name: URI - Verify license was exported successfully
      ansible.builtin.assert:
        that:
          - not uri_license_content.failed
          - "'OK' in uri_license_content.msg"

    - name: Set license data
      set_fact:
        license_data: "{{ uri_license_content.json }}"

    - name: Decode license file
      set_fact:
        license_file: "{{ license_data.LicenseFile | b64decode | string }}"

    - name: Export iDRAC License to local share- File Creation
      ansible.builtin.copy:
        content: "{{ license_file }}"
        dest: "{{ base_path_for_exported_license }}\
         /uri_license_export_{{ idrac_ip }}.txt"
      register: uri_file

    - name: Set the file name
      ansible.builtin.set_fact:
        export_file_name: "{{ idrac_license_id }}"

    - name: Export iDRAC License to local share with filename
      dellemc.openmanage.idrac_license:
        license_id: "{{ idrac_license_id }}"
        export: true
        share_parameters:
          file_name: "{{ export_file_name }}"
          share_name: "{{ base_path_for_exported_license }}"
          share_type: local
      register: idrac_export_license

    - name: Module - Verify license was exported successfully
      ansible.builtin.assert:
        that:
          - idrac_export_license.changed
          - idrac_export_license.msg == "Successfully exported the license."

    - name: Export iDRAC License to local share without filename
      dellemc.openmanage.idrac_license:
        license_id: "{{ idrac_license_id }}"
        export: true
        share_parameters:
          share_name: "{{ base_path_for_exported_license }}"
          share_type: local
      register: idrac_export_license

    - name: Module - Verify license was exported successfully
      ansible.builtin.assert:
        that:
          - idrac_export_license.changed
          - idrac_export_license.msg == "Successfully exported the license."

    - name: List of license files
      ansible.builtin.set_fact:
        license_files:
          - "uri_license_export_{{ idrac_ip }}.txt"
          - "{{ export_file_name }}_iDRAC_license.txt"
      no_log: false

    - name: Get file stats for file exported using URI
      ansible.builtin.stat:
        path: "{{ base_path_for_exported_license }}\
         /uri_license_export_{{ idrac_ip }}.txt"
      register: uri_file_stats

    - name: Get file stats for file exported using module(with filename)
      ansible.builtin.stat:
        path: "{{ base_path_for_exported_license }}/{{ export_file_name }}"
      register: module_with_file_stats

    - name: Get file stats for file exported using module(without filename)
      ansible.builtin.stat:
        path: "{{ base_path_for_exported_license }}\
         /{{ idrac_license_id }}_iDRAC_license.xml"
      register: module_without_file_stats

    - name: Compare file sizes
      ansible.builtin.assert:
        that:
          - uri_file_stats.stat.size == module_with_file_stats.stat.size
          - uri_file_stats.stat.size == module_without_file_stats.stat.size

    - name: Compare file checksums
      ansible.builtin.assert:
        that:
          - uri_file_stats.stat.checksum == module_with_file_stats.stat.checksum
          - >
            uri_file_stats.stat.checksum ==
            module_without_file_stats.stat.checksum

  always:
    - name: Perform the cleanup
      ansible.builtin.include_tasks: _cleanup.yml

  module_defaults:
    dellemc.openmanage.idrac_license:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      idrac_port: "{{ idrac_port }}"
      validate_certs: "{{ validate_certs }}"
