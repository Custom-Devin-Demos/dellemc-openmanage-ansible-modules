---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user
     and idrac_password.'
  when: idrac_ip is not defined or idrac_user is not defined or
   idrac_password is not defined

- name: Export License https share all cases with default proxy.
  ansible.builtin.include_tasks: _export_https.yml
  vars:
    export_https_proxy_support: "default_proxy"
    export_https_proxy_type: "{{ omit }}"
    export_https_proxy_server: "{{ omit }}"
    export_https_proxy_port: "{{ omit }}"
    export_https_proxy_username: "{{ omit }}"
    export_https_proxy_password: "{{ omit }}"
    export_https_ignore_certificate_warning: "on"

- name: Waiting for idrac readiness
  ansible.builtin.wait_for:
    timeout: 10

- name: Export License https share all cases with SOCKS proxy.
  ansible.builtin.include_tasks: _export_https.yml
  vars:
    export_https_proxy_support: "parameters_proxy"
    export_https_proxy_type: socks
    export_https_proxy_server: "{{ socks4_proxy_server }}"
    export_https_proxy_port: "{{ socks4_proxy_port }}"
    export_https_proxy_username: "{{ omit }}"
    export_https_proxy_password: "{{ omit }}"
    export_https_ignore_certificate_warning: "on"
  when: "'{{ socks4_proxy_enabled }}' == 'true'"

- name: Waiting for idrac readiness
  ansible.builtin.wait_for:
    timeout: 10

- name: Export License https share all cases with HTTP proxy with credentials.
  ansible.builtin.include_tasks: _export_https.yml
  vars:
    export_https_proxy_support: "parameters_proxy"
    export_https_proxy_type: http
    export_https_proxy_server: "{{ http_proxy_server }}"
    export_https_proxy_port: "{{ http_proxy_port }}"
    export_https_proxy_username: "{{ http_proxy_username | default(omit) }}"
    export_https_proxy_password: "{{ http_proxy_password | default(omit) }}"
    export_https_ignore_certificate_warning: "on"
  when: "'{{ http_proxy_enabled }}' == 'true'"
