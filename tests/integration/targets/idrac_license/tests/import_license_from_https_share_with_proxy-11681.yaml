---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user
     and idrac_password.'
  when: idrac_ip is not defined or idrac_user is not defined or
   idrac_password is not defined

- block:
    # Begin the normal mode block here
    - name: import license from https share with proxy normal_mode
      register: result
      dellemc.openmanage.idrac_license: &module_params
        import: "{{ b_true }}"
        share_parameters:
          username: "{{ https_share_username }}"
          password: "{{ https_share_password }}"
          file_name: "{{ idrac_license_file }}"
          ip_address: "{{ https_share_ip }}"
          share_name: "{{ https_share_dir_path }}"
          share_type: https
          ignore_certificate_warning: "on"
          proxy_support: "{{ parameters_proxy }}"
          proxy_type: "{{ proxy_type_http }}"
          proxy_server: "{{ http_proxy_server }}"
          proxy_port: "{{ http_proxy_port }}"
          proxy_username: "{{ http_proxy_username }}"
          proxy_password: "{{ http_proxy_password }}"

    - name: Get iDRAC job details
      ansible.builtin.include_tasks: _job_track.yml
      vars:
        job_id: "{{ result.job_details.Id }}"

    - name: import license from https share with proxy assert normal_mode
      ansible.builtin.assert:
        that:
          - result.changed is true
          - '"Successfully imported the license" in result.msg'
          - '"The command was successful" in result.job_details.Message'
          - result.job_details.Id == idrac_job_details.Id
          - result.job_details.Message == idrac_job_details.Message

    # Begin the idempotency mode block here
    - name: import license from https share with proxy idempotency_mode
      register: result
      dellemc.openmanage.idrac_license:
        <<: *module_params
      ignore_errors: true

    - name: Get iDRAC job details
      ansible.builtin.include_tasks: _job_track.yml
      vars:
        job_id: "{{ result.job_details.Id }}"

    - name: import license from https share with proxy assert idempotency_mode
      ansible.builtin.assert:
        that:
          - result.changed is false
          - result.skipped
          - '"The license is already imported" in result.job_details.Message'
          - result.job_details.Id == idrac_job_details.Id
          - result.job_details.Message == idrac_job_details.Message

  always:
    - ansible.builtin.include_tasks: _cleanup_import.yml

- block:
    # Begin the normal mode block here
    - name: import license from https share with default proxy normal_mode
      register: result
      dellemc.openmanage.idrac_license: &module_params1
        import: "{{ b_true }}"
        share_parameters:
          username: "{{ https_share_username }}"
          password: "{{ https_share_password }}"
          file_name: "{{ idrac_license_file }}"
          ip_address: "{{ https_share_ip }}"
          share_name: "{{ https_share_dir_path }}"
          share_type: https
          ignore_certificate_warning: "on"
          proxy_support: "{{ parameters_default_proxy }}"

    - name: Get iDRAC job details
      ansible.builtin.include_tasks: _job_track.yml
      vars:
        job_id: "{{ result.job_details.Id }}"

    - name: import license from https share with default proxy
       assert normal_mode
      ansible.builtin.assert:
        that:
          - result.changed is true
          - '"Successfully imported the license" in result.msg'
          - '"The command was successful" in result.job_details.Message'
          - result.job_details.Id == idrac_job_details.Id
          - result.job_details.Message == idrac_job_details.Message

    # Begin the idempotency mode block here
    - name: import license from https share with default proxy idempotency_mode
      register: result
      dellemc.openmanage.idrac_license:
        <<: *module_params1
      ignore_errors: true

    - name: Get iDRAC job details
      ansible.builtin.include_tasks: _job_track.yml
      vars:
        job_id: "{{ result.job_details.Id }}"

    - name: import license from https share with default proxy
       assert idempotency_mode
      ansible.builtin.assert:
        that:
          - result.changed is false
          - result.skipped
          - '"The license is already imported" in result.job_details.Message'
          - result.job_details.Id == idrac_job_details.Id
          - result.job_details.Message == idrac_job_details.Message

  always:
    - ansible.builtin.include_tasks: _cleanup_import.yml
