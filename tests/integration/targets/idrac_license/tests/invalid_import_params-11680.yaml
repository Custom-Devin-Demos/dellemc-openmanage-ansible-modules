---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined'

- block:
    - name: Import license without license file
      dellemc.openmanage.idrac_license:
        import: "{{ b_true }}"
        share_parameters:
          share_name: "{{ share_name_local }}"
      register: result
      ignore_errors: true

    - name: Verify error of Import license without license file
      ansible.builtin.assert:
        that:
          - result.failed
          - not result.changed
          - result.msg == "Missing required parameter 'file_name'."

    - name: Import license without share parameters
      dellemc.openmanage.idrac_license:
        import: "{{ b_true }}"
      register: result
      ignore_errors: true

    - name: Verify error of Import license without share parameters
      ansible.builtin.assert:
        that:
          - result.failed
          - not result.changed
          - 'result.msg == "import is True but all of the following are
            missing: share_parameters"'

    - name: Import license with invalid license file
      dellemc.openmanage.idrac_license:
        import: "{{ b_true }}"
        share_parameters:
          username: "{{ http_share_user }}"
          password: "{{ http_share_password }}"
          ip_address: "{{ http_share }}"
          share_name: "{{ http_share_dir_path }}"
          share_type: http
          file_name: "{{ invalid_file_name }}"
      register: result
      ignore_errors: true

    - name: Verify error of Import license with invalid license file
      ansible.builtin.assert:
        that:
          - result.failed
          - not result.changed
          - 'result.msg == "Unable to perform the operation due to an
            unknown error in iDRAC." or result.msg == "Unable to transfer a
            file, {{ invalid_file_name }}, because the file is not available
            at the remote host location."'

    - set_fact:
        cifs_share_ip: "{{ cifs_share_name.split(source_delimiter)[2]}}"
        nfs_share_ip: "{{ nfs_share_name.split(':')[0] }}"
      vars:
        source_delimiter: "\\"

    - name: Import license with invalid share name
      dellemc.openmanage.idrac_license:
        import: "{{ b_true }}"
        share_parameters:
          username: "{{ cifs_share_user }}"
          password: "{{ cifs_share_password }}"
          file_name: "{{ idrac_license_file }}"
          ip_address: "{{ cifs_share_ip }}"
          share_type: cifs
          share_name: "/invalid"
      register: result
      ignore_errors: true

    - name: Verify error of Import license with invalid share name
      ansible.builtin.assert:
        that:
          - result.failed
          - not result.changed
          - 'result.msg == "Could not connect to network share." or
             result.msg == "Resource allocation failure"'

    - name: Import license with invalid share type
      dellemc.openmanage.idrac_license:
        import: "{{ b_true }}"
        share_parameters:
          file_name: "{{ idrac_license_file }}"
          share_name: "{{ share_name_local }}"
          share_type: invalid
      register: result
      ignore_errors: true

    - name: Verify error of Import license with invalid share type
      ansible.builtin.assert:
        that:
          - result.failed
          - not result.changed
          - 'result.msg == "value of share_type must be one of: local, nfs,
            cifs, http, https, got: invalid found in share_parameters"'

    - name: Import license with invalid share ipaddress
      dellemc.openmanage.idrac_license:
        import: "{{ b_true }}"
        share_parameters:
          username: "{{ https_share_username }}"
          password: "{{ https_share_password }}"
          file_name: "{{ idrac_license_file }}"
          ip_address: "1.1.1.1"
          share_name: "{{ https_share_dir_path }}"
          share_type: http
      register: result
      ignore_errors: true

    - name: Network Connection failure - Set the expected message
      ansible.builtin.set_fact:
        invalid_network_expected_msg: "Unable to perform the
          operation due to an unknown error in iDRAC."

    - name: Verify error of Import license with invalid share ipaddress
      ansible.builtin.assert:
        that:
          - result.failed
          - not result.changed
          - result.msg == invalid_network_expected_msg

    - name: Import license with invalid share username/path
      dellemc.openmanage.idrac_license:
        import: "{{ b_true }}"
        share_parameters:
          username: "invalid"
          password: "{{ http_share_password }}"
          file_name: "{{ idrac_license_file }}"
          ip_address: "{{ nfs_share_ip }}"
          share_name: "{{ http_share_dir_path }}"
          share_type: http
      register: result
      ignore_errors: true

    - name: Invalid share credentials - Set the expected message
      ansible.builtin.set_fact:
        invalid_share_credentials_expected_msg: "Unable to perform the
          operation due to an unknown error in iDRAC."

    - name: Verify error of Import license with invalid share username/path
      ansible.builtin.assert:
        that:
          - result.failed
          - not result.changed
          - result.msg == invalid_share_credentials_expected_msg

    - name: Import license with invalid share password/path
      dellemc.openmanage.idrac_license:
        import: "{{ b_true }}"
        share_parameters:
          username: "{{ http_share_user }}"
          password: "invalid"
          file_name: "{{ idrac_license_file }}"
          ip_address: "{{ nfs_share_ip }}"
          share_name: "{{ http_share_dir_path }}"
          share_type: http
      register: result
      ignore_errors: true

    - name: Verify error of Import license with invalid share password/path
      ansible.builtin.assert:
        that:
          - result.failed
          - not result.changed
          - result.msg == invalid_share_credentials_expected_msg

    - name: Import license with invalid certificate warning
      dellemc.openmanage.idrac_license:
        import: "{{ b_true }}"
        share_parameters:
          username: "{{ https_share_username }}"
          password: "{{ https_share_password }}"
          file_name: "{{ idrac_license_file }}"
          ip_address: "{{ https_share_ip }}"
          share_name: "{{ https_share_dir_path }}"
          share_type: https
          ignore_certificate_warning: "invalid"
      register: result
      ignore_errors: true

    - name: Verify error of Import license with invalid certificate warning
      ansible.builtin.assert:
        that:
          - result.failed
          - not result.changed
          - 'result.msg == "value of ignore_certificate_warning must be one of:
            off, on, got: invalid found in share_parameters"'
