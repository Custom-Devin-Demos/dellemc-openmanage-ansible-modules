---
- name: Test that we have an OME host, OME username and OME password
  ansible.builtin.fail:
    msg: 'Please define the following variables: hostname, username
         and password.'
  when: hostname is not defined or username is not defined or password
         is not defined

- block:
    - name: Negative - missing required argument
      dellemc.openmanage.ome_application_security_settings:
        timeout: 10
      register: invalid_missing_argument
      ignore_errors: true

    - name: Verify task status - Negative - missing required argument
      ansible.builtin.assert:
        that:
          - invalid_missing_argument.failed
          - not invalid_missing_argument.changed
          - 'invalid_missing_argument.msg == "one of the following
            is required: restrict_allowed_ip_range,
            login_lockout_policy, fips_mode_enable"'

    - name: Negative - unsupported argument
      dellemc.openmanage.ome_application_security_settings:
        unsupported_argument: unsupported
        restrict_allowed_ip_range:
          enable_ip_range: false
        state: absent
        device: PSDF
      register: invalid_unsupported_argument
      ignore_errors: true

    - name: Verify task status - Negative - unsupported argument
      ansible.builtin.assert:
        that:
          - invalid_unsupported_argument.failed
          - not invalid_unsupported_argument.changed
          - 'invalid_unsupported_argument.msg == "Unsupported parameters
            for (dellemc.openmanage.ome_application_security_settings)
            module: device, state,
            unsupported_argument. Supported parameters include: ca_path,
            fips_mode_enable, hostname, job_wait,
            job_wait_timeout, login_lockout_policy, password, port,
            restrict_allowed_ip_range, timeout, username, validate_certs,
            x_auth_token."'

    - name: Negative - unreachable host
      dellemc.openmanage.ome_application_security_settings:
        hostname: 999.999.999.999
        restrict_allowed_ip_range:
          enable_ip_range: false
      register: invalid_unreachable
      ignore_unreachable: true

    - name: Verify task status - Negative - unreachable host
      ansible.builtin.assert:
        that:
          - invalid_unreachable.unreachable
          - not invalid_unreachable.changed
          - 'invalid_unreachable.msg == "<urlopen error Unable to
            resolve hostname or IP 999.999.999.999.>"
            or invalid_unreachable.msg == "<urlopen error
            [Errno -2] Name or service not known>"'

    - name: Negative - invalid port
      dellemc.openmanage.ome_application_security_settings:
        port: 65536
        restrict_allowed_ip_range:
          enable_ip_range: false
      register: invalid_port
      ignore_unreachable: true

    - name: Verify task status - Negative - invalid port
      ansible.builtin.assert:
        that:
          - invalid_port.unreachable
          - not invalid_port.changed
          - '"urlopen error" in invalid_port.msg'

    - name: Negative - invalid username
      dellemc.openmanage.ome_application_security_settings:
        username: invalid
        restrict_allowed_ip_range:
          enable_ip_range: false
      register: invalid_username
      ignore_errors: true

    - name: Verify task status - Negative - invalid username
      ansible.builtin.assert:
        that:
          - invalid_username.failed
          - not invalid_username.changed
          - 'invalid_username.msg == "HTTP Error 401: Unauthorized"
             or invalid_username.msg == "<urlopen error timed out>" or
             invalid_username.msg == "HTTP Error 401: 401"'

    - name: Negative - invalid password
      dellemc.openmanage.ome_application_security_settings:
        password: invalid
        restrict_allowed_ip_range:
          enable_ip_range: false
      register: invalid_password
      ignore_errors: true

    - name: Verify task status - Negative - invalid password
      ansible.builtin.assert:
        that:
          - invalid_password.failed
          - not invalid_password.changed
          - 'invalid_password.msg == "HTTP Error 401: Unauthorized"
             or invalid_password.msg == "<urlopen error timed out>" or
             invalid_password.msg == "HTTP Error 401: 401"'

    - name: Negative - invalid validate_certs
      dellemc.openmanage.ome_application_security_settings:
        validate_certs: invalid
        restrict_allowed_ip_range:
          enable_ip_range: false
      register: invalid_validate_certs
      ignore_errors: true

    - name: Verify task status - Negative - invalid validate_certs
      ansible.builtin.assert:
        that:
          - invalid_validate_certs.failed
          - not invalid_validate_certs.changed
          - "\"The value 'invalid' is not a valid boolean\"
            in invalid_validate_certs.msg"

    - name: Negative - invalid ca_path path
      dellemc.openmanage.ome_application_security_settings:
        ca_path: /invalid/path
        restrict_allowed_ip_range:
          enable_ip_range: false
      register: invalid_ca_path
      ignore_errors: true

    - name: Verify task status - Negative - invalid ca_path path
      ansible.builtin.assert:
        that:
          - invalid_ca_path.failed
          - not invalid_ca_path.changed
          - '"[Errno 2] No such file or directory"
            in invalid_ca_path.msg'

    - name: Negative - invalid timeout type
      dellemc.openmanage.ome_application_security_settings:
        timeout: invalid
        restrict_allowed_ip_range:
          enable_ip_range: false
      register: invalid_timeout_type
      ignore_errors: true

    - name: Verify task status - Negative - invalid timeout type
      ansible.builtin.assert:
        that:
          - invalid_timeout_type.failed
          - not invalid_timeout_type.changed
          - '"argument ''timeout'' is
            of type <class ''str''> and we were unable to convert
            to int" in invalid_timeout_type.msg or
            "argument ''timeout'' is of type str and we were unable
            to convert to int" in invalid_timeout_type.msg'

    - name: Negative - invalid timeout value
      dellemc.openmanage.ome_application_security_settings:
        timeout: -1
        restrict_allowed_ip_range:
          enable_ip_range: false
      register: invalid_timeout_value
      ignore_errors: true

    - name: Verify task status - Negative - invalid timeout value
      ansible.builtin.assert:
        that:
          - invalid_timeout_value.failed
          - not invalid_timeout_value.changed
          - 'invalid_timeout_value.msg == "Timeout value out of range"'

    - name: Negative - invalid fips_mode_enable value
      dellemc.openmanage.ome_application_security_settings:
        fips_mode_enable: InvalidValue
      register: invalid_fips_mode_enable_value
      ignore_errors: true

    - name: Verify task status - Negative - invalid fips_mode_enable value
      ansible.builtin.assert:
        that:
          - invalid_fips_mode_enable_value.failed
          - not invalid_fips_mode_enable_value.changed
          - "\"The value 'InvalidValue' is not a valid boolean.\"
            in invalid_fips_mode_enable_value.msg"

    - name: Negative - invalid by_user_name value
      dellemc.openmanage.ome_application_security_settings:
        login_lockout_policy:
          by_user_name: InvalidValue
      register: invalid_by_user_name_value
      ignore_errors: true

    - name: Verify task status - Negative - invalid by_user_name value
      ansible.builtin.assert:
        that:
          - invalid_by_user_name_value.failed
          - not invalid_by_user_name_value.changed
          - "\"The value 'InvalidValue' is not a valid boolean.\"
            in invalid_by_user_name_value.msg"

    - name: Negative - invalid by_ip_address value
      dellemc.openmanage.ome_application_security_settings:
        login_lockout_policy:
          by_ip_address: InvalidValue
      register: invalid_by_ip_address_value
      ignore_errors: true

    - name: Verify task status - Negative - invalid by_ip_address value
      ansible.builtin.assert:
        that:
          - invalid_by_ip_address_value.failed
          - not invalid_by_ip_address_value.changed
          - "\"The value 'InvalidValue' is not a valid boolean.\"
            in invalid_by_ip_address_value.msg"

    - name: Negative - invalid restrict_allowed_ip_range value
      dellemc.openmanage.ome_application_security_settings:
        restrict_allowed_ip_range:
          enable_ip_range: InvalidValue
      register: invalid_restrict_allowed_ip_range_value
      ignore_errors: true

    - name: "Verify task status - Negative -
        invalid restrict_allowed_ip_range value"
      ansible.builtin.assert:
        that:
          - invalid_restrict_allowed_ip_range_value.failed
          - not invalid_restrict_allowed_ip_range_value.changed
          - "\"The value 'InvalidValue' is not a valid boolean.\"
            in invalid_restrict_allowed_ip_range_value.msg"

    - name: Negative - invalid job_wait value
      dellemc.openmanage.ome_application_security_settings:
        job_wait: InvalidValue
        restrict_allowed_ip_range:
          enable_ip_range: false
      register: invalid_job_wait_value
      ignore_errors: true

    - name: Verify task status - Negative - invalid job_wait value
      ansible.builtin.assert:
        that:
          - invalid_job_wait_value.failed
          - not invalid_job_wait_value.changed
          - "\"The value 'InvalidValue' is not a valid boolean.\"
            in invalid_job_wait_value.msg"

    - name: Negative - invalid job_wait_timeout value
      dellemc.openmanage.ome_application_security_settings:
        job_wait: true
        job_wait_timeout: -2
        login_lockout_policy:
          lockout_penalty_time: 1
      register: invalid_job_wait_timeout_value
      ignore_errors: true

    - name: Verify task status - Negative - invalid job_wait_timeout value
      ansible.builtin.assert:
        that:
          - invalid_job_wait_timeout_value.failed
          - not invalid_job_wait_timeout_value.changed
          # JIT-281978 - Ansible(8.5.0)
          # Job_wait_timeout as negative value when passed
          # error msg is not appropriate.
          - invalid_job_wait_timeout_value.msg ==
            "The value for the 'job_wait_timeout' parameter
            cannot be negative or zero."

    - name: Negative - invalid lockout_fail_count value
      dellemc.openmanage.ome_application_security_settings:
        timeout: 30
        login_lockout_policy:
          lockout_fail_count: 0
      register: invalid_lockout_fail_count_value
      ignore_errors: true

    - name: Verify task status - Negative - invalid lockout_fail_count value
      ansible.builtin.assert:
        that:
          - invalid_lockout_fail_count_value.failed
          - not invalid_lockout_fail_count_value.changed
          - '"Running. parsing apply configuration input.
            Successfully parsed input.
            Applying settings : Security.
            error while applying Setting: Security CSEC1535|Account service
            cannot be updated because invalid
            value is provided for account lockout threshold..
            applied Settings with Errors.
            Task Failed. Completed With Errors." ==
            invalid_lockout_fail_count_value.msg'

    - name: Negative - invalid lockout_fail_window value
      dellemc.openmanage.ome_application_security_settings:
        login_lockout_policy:
          lockout_fail_window: 0
      register: invalid_lockout_fail_window_value
      ignore_errors: true

    - name: Verify task status - Negative - invalid lockout_fail_window value
      ansible.builtin.assert:
        that:
          - invalid_lockout_fail_window_value.failed
          - not invalid_lockout_fail_window_value.changed
          - '"Running. parsing apply configuration input.
            Successfully parsed input.
            Applying settings : Security. error while applying Setting:
            Security CSEC1537|Unable to update account service because
            the entered value for Account Lockout Duration is
            invalid.. applied Settings with Errors. Task Failed.
            Completed With Errors." in invalid_lockout_fail_window_value.msg'

    - name: Negative - invalid lockout_penalty_time value
      dellemc.openmanage.ome_application_security_settings:
        login_lockout_policy:
          lockout_penalty_time: 0
      register: invalid_lockout_penalty_time_value
      ignore_errors: true

    - name: Verify task status - Negative - invalid lockout_penalty_time value
      ansible.builtin.assert:
        that:
          - invalid_lockout_penalty_time_value.failed
          - not invalid_lockout_penalty_time_value.changed
          - '"Running. parsing apply configuration input.
            Successfully parsed input. Applying settings : Security.
            error while applying Setting: Security CSEC1536|Unable to
            update account service because the entered value for Account
            Lockout Counter Reset After is invalid.. applied Settings
            with Errors. Task Failed. Completed With Errors."
            in invalid_lockout_penalty_time_value.msg'

  module_defaults:
    dellemc.openmanage.ome_application_security_settings:
      validate_certs: "{{ validate_certs }}"
      hostname: "{{ hostname | ansible.utils.ipwrap }}"
      username: "{{ username }}"
      password: "{{ password }}"
      port: "{{ port }}"
