---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined'

- block:
    - name: Boot to Network ISO with nfs share (iso_invalid)
      dellemc.openmanage.idrac_os_deployment:
        share_name: "{{ nfs_share_name }}"
        iso_image: "invalid.iso"
        expose_duration: 5
      ignore_errors: true
      register: result_iso_invalid

    - ansible.builtin.wait_for: timeout=10

    - name: Boot to Network ISO with nfs share (nfs_share_invalid)
      dellemc.openmanage.idrac_os_deployment:
        share_name: "{{ nfs_share_name }}/invalid"
        iso_image: "{{ iso_image }}"
        expose_duration: 5
      ignore_errors: true
      register: result_nfs_invalid

    - ansible.builtin.wait_for: timeout=10

    - name: Boot to Network ISO with cifs share (cifs_share_invalid)
      dellemc.openmanage.idrac_os_deployment:
        share_name: "{{ cifs_share_name }}\\invalid"
        share_user: "{{ cifs_share_user }}"
        share_password: "{{ cifs_share_password }}"
        iso_image: "{{ iso_image }}"
        expose_duration: 5
      ignore_errors: true
      register: result_cifs_invalid

    - name: Boot to Network ISO with cifs share (invalid exposed time)
      dellemc.openmanage.idrac_os_deployment:
        share_name: "{{ cifs_share_name }}"
        share_user: "{{ cifs_share_user }}"
        share_password: "{{ cifs_share_password }}"
        iso_image: "{{ iso_image }}"
        expose_duration: -5
      ignore_errors: true
      register: result_exp_time_invalid

    - name: Negative-host unrechable
      dellemc.openmanage.idrac_os_deployment:
        idrac_ip: "999.999.999.999"
        share_name: "{{ nfs_share_name }}"
        iso_image: "{{ iso_image }}"
        expose_duration: 5
      ignore_unreachable: true
      register: invalid_unreachable

    - name: Verify the status of tasks
      ansible.builtin.assert:
        that:
          - result_iso_invalid.failed
          - not result_iso_invalid.changed
          - result_iso_invalid.msg.Status == "Failed"
          - result_iso_invalid.msg.Message == "Unable to locate the ISO image
             on the network share point."
          - result_nfs_invalid.failed
          - not result_nfs_invalid.changed
          - result_nfs_invalid.msg.Status == "Failed"
          - result_nfs_invalid.msg.Message == "Inaccessible network share."
          - result_cifs_invalid.failed
          - not result_cifs_invalid.changed
          - result_cifs_invalid.msg.Status == "Failed"
          - result_cifs_invalid.msg.Message == "Inaccessible network share."
          - result_exp_time_invalid.failed
          - not result_exp_time_invalid.changed
          - result_exp_time_invalid.msg == "Invalid value for ExposeDuration."
          - invalid_unreachable.unreachable
          - not invalid_unreachable.changed
          - 'invalid_unreachable.msg == "<urlopen error [Errno -2]
              Name or service not known>"'


  module_defaults:
    dellemc.openmanage.idrac_os_deployment:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
