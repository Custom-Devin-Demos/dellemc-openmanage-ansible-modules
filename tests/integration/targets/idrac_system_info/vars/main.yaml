base_uri: "https://{{ idrac_ip | ansible.utils.ipwrap }}:{{ idrac_port }}/"
redfish_uri: "redfish/v1/"
fan_uri: "{{ base_uri }}{{ redfish_uri }}\
  Chassis/System.Embedded.1/ThermalSubsystem/Fans?$expand=*($levels=1)"
manager_uri: "{{ base_uri }}{{ redfish_uri }}\
  Managers/iDRAC.Embedded.1/"
bios_uri: "{{ base_uri }}{{ redfish_uri }}\
  Systems/System.Embedded.1/Bios"
manager_system_attributes_uri: "{{ base_uri }}\
  {{ redfish_uri }}Managers/iDRAC.Embedded.1/Oem/\
  Dell/DellAttributes/System.Embedded.1"
manager_idrac_attributs_uri: "{{ base_uri }}\
  {{ redfish_uri }}Managers/iDRAC.Embedded.1/\
  Oem/Dell/DellAttributes/iDRAC.Embedded.1"
idrac_system_uri: "{{ base_uri }}\
  {{ redfish_uri }}Systems/System.Embedded.1"
bios_firmware_uri: "{{ base_uri }}\
  {{ redfish_uri }}UpdateService/Oem/Dell/DellSoftwareInventory"
cpu_uri: "{{ base_uri }}\
  {{ redfish_uri }}Systems/System.Embedded.1/Processors?$expand=*($levels=1)"
video_uri: "{{ base_uri }}{{ redfish_uri }}Systems/System.Embedded.1/"
chassis_uri: "{{ base_uri }}{{ redfish_uri }}Chassis"
license_uri: "{{ base_uri }}\
  {{ redfish_uri }}LicenseService/Licenses?$expand=*($levels=1)"
memory_uri: "{{ base_uri }}\
  {{ redfish_uri }}Systems/System.Embedded.1/Memory?%24expand=*(%24levels%3D1)"
power_supply_uri: "{{ chassis_uri }}\
  /System.Embedded.1/PowerSubsystem/PowerSupplies?$expand=*($levels=1)"
voltage_uri: "{{ chassis_uri }}/System.Embedded.1/Power#/Voltages"
sensor_uri: "{{ base_uri }}\
  {{ redfish_uri }}Systems/System.Embedded.1/Oem/Dell/DellSensors"
fan_sensor_uri: "{{ chassis_uri }}\
  /System.Embedded.1/Oem/Dell/DellEnclosureFanSensors"
intrusion_uri: "{{ chassis_uri }}\
  /System.Embedded.1?$select=PhysicalSecurity/IntrusionSensor"
temperature_uri: "{{ chassis_uri }}\
  /System.Embedded.1/Oem/Dell/DellEnclosureTemperatureSensors"
storage_uri: "{{ base_uri }}\
  {{ redfish_uri }}Systems/System.Embedded.1/Storage?$expand=*($levels=1)"
sensor_amperage_uri: "{{ chassis_uri }}\
  /System.Embedded.1/Sensors/SystemBoardPwrConsumption"
system_uri: "{{ base_uri }}\
  {{ redfish_uri }}Systems/System.Embedded.1"
system_details_uri: "{{ base_uri }}\
  redfish/v1/Systems/System.Embedded.1/Oem/Dell/DellSystem/System.Embedded.1"
