---
- name: Fetch system metrics details
  ansible.builtin.uri:
    url: "{{ system_board_pwrconsumption_uri }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    force_basic_auth: true
    validate_certs: false
    return_content: true
    status_code: 200
  register: system_powerconsumption

- name: Fetch system inlet temperature details
  ansible.builtin.uri:
    url: "{{ system_board_inlettemp_uri }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    force_basic_auth: true
    validate_certs: false
    return_content: true
    status_code: 200
  register: system_inlettemp

- name: Fetch power headroom details
  ansible.builtin.uri:
    url: "{{ power_headroom_uri }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    force_basic_auth: true
    validate_certs: false
    return_content: true
    status_code: 200
  register: system_powerheadroom

- name: Structuring system metrics details
  ansible.builtin.command:
    cmd: >
      python _get_system_metrics_details.py
      '{{ system_powerconsumption.json | to_json }}'
      '{{ system_inlettemp.json | to_json }}'
      '{{ system_powerheadroom.json | to_json }}'
    chdir: "{{ playbook_dir }}/targets/idrac_system_info/tests"
  register: system_metrics_updated_dict

- name: Output conversion to list
  ansible.builtin.set_fact:
    system_metrics_updated_dict: "{{ system_metrics_updated_dict.stdout
                                 | from_json }}"

- name: Sorting and filtering the data before compare
  ansible.builtin.set_fact:
    SystemMetrics: >-
      {{ result.system_info.SystemMetrics
         | map('dict2items')
         | map('rejectattr', 'key', 'equalto', 'EnergyConsumption')
         | map('items2dict')
         | list
         | sort(attribute='Key') }}
    APISystemMetrics: >-
      {{ system_metrics_updated_dict
         | map('dict2items')
         | map('rejectattr', 'key', 'equalto', 'EnergyConsumption')
         | map('items2dict')
         | list
         | sort(attribute='Key') }}

- name: Comparing values inside list for system metrics
  ansible.builtin.include_tasks:
    file: _compare_diff.yml
  vars:
    _before: "{{ item.0 }}"
    _after: "{{ item.1 }}"
  loop: "{{ SystemMetrics | zip(APISystemMetrics) }}"
