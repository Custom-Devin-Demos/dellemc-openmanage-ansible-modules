---
- name: Fetch memory details
  ansible.builtin.uri:
    url: "{{ base_uri }}{{ memory_uri }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    force_basic_auth: true
    validate_certs: false
    body_format: json
    return_content: true
    status_code: 200
  register: uri_data

- name: Structuring memory details
  ansible.builtin.command:
    cmd: >
      python _get_memory_details.py
      '{{ uri_data.json | to_json }}'
    chdir: "{{ playbook_dir }}/targets/idrac_system_info/tests"
  environment:
    PYTHONPATH: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATH') }}"
  register: memory_updated_dict
  when:
    - uri_data.status == 200

- name: Output conversion to list
  ansible.builtin.set_fact:
    memory_updated_dict: "{{ memory_updated_dict.stdout | from_yaml }}"
  when:
    - uri_data.status == 200

- name: Comparing values inside list for memory
  ansible.builtin.include_tasks:
    file: _compare_diff.yml
  vars:
    _before: "{{ item.0 | dict2items
        | items2dict}}"
    _after: "{{ item.1 | dict2items
        | items2dict}}"
  when: uri_data.status == 200
  loop: >-
    {{
    result.system_info.Memory
    | sort(attribute='BankLabel')
    | zip(memory_updated_dict | sort(attribute='BankLabel'))
    | list
    }}
