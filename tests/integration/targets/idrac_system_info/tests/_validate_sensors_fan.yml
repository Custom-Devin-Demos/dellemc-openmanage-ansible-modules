- name: Fetch thermal fan list
  ansible.builtin.uri:
    url: "{{ thermal_uri }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    force_basic_auth: true
    validate_certs: false
    return_content: true
    status_code: 200
  register: thermal_data

- name: Initialize fan sensor map
  ansible.builtin.set_fact:
    fan_sensor_map: {}

- name: Fetch each fan's sensor data
  ansible.builtin.uri:
    url: "{{ base_uri }}/{{ redfish_uri }}\
      /Chassis/System.Embedded.1/Sensors/{{ item.FanName }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    force_basic_auth: true
    validate_certs: false
    return_content: true
    status_code: 200
  loop: "{{ thermal_data.json.Fans }}"
  loop_control:
    label: "{{ item.FanName }}"
  register: fan_sensor_results

- name: Build fan_sensor_map fact
  ansible.builtin.set_fact:
    fan_sensor_map: "{{ dict(
                        fan_sensor_results.results
                        | map(attribute='item.FanName')
                        | zip(fan_sensor_results.results | map(attribute='json'))
                      ) }}"

- name: Run fan helper script
  ansible.builtin.command:
    cmd: >
      python _get_sensors_fan_details.py
      '{{ thermal_data.json | to_json }}'
      '{{ fan_sensor_map | to_json }}'
    chdir: "{{ playbook_dir }}/targets/idrac_system_info/tests"
  environment:
    PYTHONPATH: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATH') }}"
  register: fan_sensor_updated_dict
  no_log: true
  when:
    - thermal_data.status == 200

- name: Output conversion to list
  ansible.builtin.set_fact:
    fan_sensor_updated_dict: "{{ fan_sensor_updated_dict.stdout | from_yaml }}"
  when:
    - thermal_data.status == 200

- name: Remove current reading from fan data before compare
  ansible.builtin.set_fact:
    fan_details_before: "{{ result.system_info.Sensors_Fan
                        | map('combine', {'CurrentReading': omit}) | list }}"
    fan_details_after: "{{ fan_sensor_updated_dict
                        | map('combine', {'CurrentReading': omit}) | list }}"
  when:
    - thermal_data.status == 200

- name: Comparing values inside list for sensors_fan (ignoring CurrentReading)
  ansible.builtin.include_tasks:
    file: _compare_diff.yml
  vars:
    _before: "{{ item.0 }}"
    _after: "{{ item.1 }}"
  loop: "{{ fan_details_before | zip(fan_details_after) }}"
  when:
    - thermal_data.status == 200
