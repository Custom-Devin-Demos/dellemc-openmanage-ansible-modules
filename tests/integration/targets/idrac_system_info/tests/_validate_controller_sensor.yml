---
- name: Fetch controller sensor details
  ansible.builtin.uri:
    url: "{{ storage_uri }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    force_basic_auth: true
    validate_certs: false
    body_format: json
    return_content: true
    status_code: 200
  register: uri_data

- name: Structuring controller sensor details
  ansible.builtin.command:
    cmd: >
      python _get_controller_sensor_details.py
      '{{ uri_data.json | to_json }}'
    chdir: "{{ playbook_dir }}/targets/idrac_system_info/tests"
  environment:
    PYTHONPATH: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATH') }}"
  register: controller_sensor_updated_dict
  when:
    - uri_data.status == 200

- name: Output conversion to list
  ansible.builtin.set_fact:
    controller_sensor_updated_dict: "{{ controller_sensor_updated_dict.stdout
                                    | from_yaml }}"
  when:
    - uri_data.status == 200

- name: Comparing values inside list for controller sensor
  ansible.builtin.include_tasks:
    file: _compare_diff.yml
  vars:
    _before: "{{ item.0 }}"
    _after: "{{ item.1 }}"
  when: uri_data.status == 200
  loop: "{{ result.system_info.ControllerSensor
        | zip(controller_sensor_updated_dict) }}"
