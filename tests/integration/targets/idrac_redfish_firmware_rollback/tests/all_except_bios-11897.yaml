---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: "Please define the following variables: idrac_ip, idrac_user and
      idrac_password."
  when: "idrac_ip is not defined or idrac_user is not defined or idrac_password
    is not defined"

- name: Check whether idrac IP is IPv4 or IPv6.
  ansible.builtin.set_fact:
    is_ipv4: "{{ idrac_ip is ansible.utils.ipv4 }}"
    is_ipv6: "{{ idrac_ip is ansible.utils.ipv6 }}"

- ansible.builtin.include_tasks: _get_system_info.yml

- name: Prerequisite - Check if network components available.
  ansible.builtin.fail:
    msg: "Prerequisite not met. Network component is not available"
  when: network_components | length < 1

- ansible.builtin.include_tasks: _get_firmware_inventory.yml

- ansible.builtin.set_fact:
    network_components_rollback: "{{ rollback_component_list |
      intersect(network_components) }}"

- ansible.builtin.include_tasks: _get_server_generation.yml

- name: Set Firmware Inventory name for iDRAC10
  ansible.builtin.set_fact:
    rollback_component_name_bios: "BIOS Firmware Inventory"
    rollback_component_name_idrac: "BMC Firmware Inventory"
    rollback_component_name_bios_regex: "(?!BIOS Firmware Inventory).*"
  when: generation | int >= 17

- name: Set Firmware Inventory name for iDRAC9
  ansible.builtin.set_fact:
    rollback_component_name_bios: "BIOS"
    rollback_component_name_idrac: "Integrated Dell Remote Access Controller"
    rollback_component_name_bios_regex: "(?!BIOS).*"
  when: generation | int < 17

- name: Prerequisite - Check if rollback version available
   for network components.
  ansible.builtin.fail:
    msg: "Prerequisite not met. Rollback version not available for
      network components"
  when: >
    (generation | int >= 17 and
    ('NIC.Slot Firmware Inventory' not in rollback_component_list))
    or
    (generation | int < 17 and
    (network_components_rollback | length < 1))

- name: Prerequisite - Check if rollback version available for idrac.
  ansible.builtin.fail:
    msg: "Prerequisite not met. Rollback version not available for
      {{ rollback_component_name_idrac }} component"
  when: "rollback_component_name_idrac not in
    rollback_component_list"

- name: Prerequisite - Check if rollback version available for bios.
  ansible.builtin.fail:
    msg: "Prerequisite not met. Rollback version not available for
      {{ rollback_component_name_bios }} component"
  when: "rollback_component_name_bios not in rollback_component_list"

- block:
    - ansible.builtin.include_tasks: _get_firmware_inventory.yml
      vars:
        components_list: "{{ rollback_component_list |
          reject('search', rollback_component_name_bios ) }}"

    - ansible.builtin.set_fact:
        rollback_to_version_list: "{{ previous_versions }}"

    - name: Rollback all components firmware except bios with reboot as true
        (Check mode - changes expected)
      redfish_firmware_rollback: &redfish_firmware_rollback_1
        name: "{{ rollback_component_name_bios_regex }}"
        reboot: true
        reboot_timeout: 5400
        timeout: 300
      register: result
      check_mode: true

    - name: Verify task status - Rollback all components firmware except bios
        with reboot as true (Check mode - changes expected)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Changes found to be applied."

    - name: Rollback all components firmware except bios with reboot as true
        (Normal mode)
      redfish_firmware_rollback:
        <<: *redfish_firmware_rollback_1
      register: result

    - ansible.builtin.set_fact:
        job_list: []
        uri_job_status: []

    - ansible.builtin.set_fact:
        job_list: "{{ job_list + [item.Id] }}"
      loop: "{{ result.job_status }}"

    - ansible.builtin.include_tasks: _get_job_details.yml
      vars:
        job_id: "{{ item }}"
      with_items: "{{ job_list }}"

    - ansible.builtin.set_fact:
        module_job_status: "{{ result.job_status | ansible.utils.remove_keys(
          target=['ActualRunningStopTime', 'ActualRunningStartTime'],
          matching_parameter='regex') }}"

    - ansible.builtin.include_tasks: _assert_job_status.yml

    - ansible.builtin.include_tasks: _get_firmware_inventory.yml
      vars:
        components_list: "{{ rollback_component_list |
          reject('search', rollback_component_name_bios) }}"

    - name: Verify task status -  Rollback all components firmware except
        bios with reboot as true (Normal mode)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Successfully completed the job for
            firmware rollback."
          - installed_versions | sort == rollback_to_version_list | sort

    - ansible.builtin.wait_for: timeout=30

    - ansible.builtin.include_tasks: _get_firmware_inventory.yml
      vars:
        component: "{{ rollback_component_name_idrac }}"

    - ansible.builtin.set_fact:
        idrac_rollback_to_version: "{{ previous_version }}"

    - name: Rollback all components firmware except bios with reboot
        as false (Check mode - changes expected)
      dellemc.openmanage.redfish_firmware_rollback: &redfish_firmware_rollback_2
        name: "{{ rollback_component_name_bios_regex }}"
        reboot: false
        timeout: 300
      register: result
      check_mode: true

    - name: Verify task status - Rollback all components firmware except
        bios with reboot as false (Check mode - changes expected)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Changes found to be applied."

    - name: Rollback all components firmware except bios with reboot as
        false (Normal mode)
      dellemc.openmanage.redfish_firmware_rollback:
        <<: *redfish_firmware_rollback_2
      register: result

    - name: Perform forceful restart of the device
      dellemc.openmanage.redfish_powerstate:
        reset_type: "ForceRestart"
      register: reboot_result

    - name: Wait for the device power state to be On
      ansible.builtin.uri:
        url: "{{ powerstate_uri }}"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        headers: "Accept=application/json"
      register: current_powerstate
      until: current_powerstate.json.PowerState == "On"
      retries: 20
      delay: 30

    - ansible.builtin.set_fact:
        job_list: []
        uri_job_status: []
        job_status_dict: {}

    - ansible.builtin.set_fact:
        job_list: "{{ job_list + [item.Id] }}"
        job_status_dict: "{{ job_status_dict |
          combine({item.Name.split('Firmware Rollback:')[1] |
          trim: item.JobState}) }}"
      loop: "{{result.job_status}}"

    - ansible.builtin.include_tasks: _get_job_details.yml
      vars:
        job_id: "{{item}}"
      with_items: "{{job_list}}"

    - ansible.builtin.set_fact:
        module_job_status: "{{ result.job_status | ansible.utils.remove_keys(
          target=['ActualRunningStopTime', 'ActualRunningStartTime'],
          matching_parameter='regex') }}"

    - ansible.builtin.include_tasks: _assert_job_status.yml

    - ansible.builtin.include_tasks: _get_firmware_inventory.yml
      vars:
        component: "{{ rollback_component_name_idrac }}"

    - ansible.builtin.set_fact:
        job_status_dict_keys: "{{ job_status_dict.keys() }}"

    - name: Verify task status -  Rollback all components firmware except bios
        with reboot as false (Normal mode)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Successfully scheduled the job for
            firmware rollback."
          - installed_version == idrac_rollback_to_version
          - rollback_component_name_bios not in job_status_dict_keys

  module_defaults:
    dellemc.openmanage.redfish_firmware_rollback:
      baseuri: "{{ idrac_ip }}"
      username: "{{ idrac_user }}"
      password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
    dellemc.openmanage.redfish_powerstate:
      baseuri: "{{ idrac_ip }}:{{ idrac_port }}"
      username: "{{ idrac_user }}"
      password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
