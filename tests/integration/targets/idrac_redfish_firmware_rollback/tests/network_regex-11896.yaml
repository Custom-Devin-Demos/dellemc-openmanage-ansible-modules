---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: "Please define the following variables: idrac_ip, idrac_user and
      idrac_password."
  when: "idrac_ip is not defined or idrac_user is not defined or idrac_password
    is not defined"

- name: Check whether idrac IP is IPv4 or IPv6.
  ansible.builtin.set_fact:
    is_ipv4: "{{ idrac_ip is ansible.utils.ipv4 }}"
    is_ipv6: "{{ idrac_ip is ansible.utils.ipv6 }}"

- ansible.builtin.include_tasks: _get_system_info.yml

- name: Prerequisite - Check if network components available.
  ansible.builtin.fail:
    msg: "Prerequisite not met. Network component is not available"
  when: network_components | length < 1

- ansible.builtin.include_tasks: _get_firmware_inventory.yml

- ansible.builtin.include_tasks: _get_server_generation.yml

- name: Set Firmware Inventory name for iDRAC10
  ansible.builtin.set_fact:
    rollback_components: "NIC.Slot Firmware Inventory"
  when: generation | int >= 17

- name: Set Firmware Inventory name for iDRAC9
  ansible.builtin.set_fact:
    network_components_rollback: "{{ rollback_component_list |
      intersect(network_components) }}"
  when: generation | int < 17

- name: Include prerequisite helper for iDRAC10 (generation >= 17)
  block:
    - ansible.builtin.include_tasks: _prereq_helper.yml
      vars:
        comp: "NIC.Slot Firmware Inventory"
      when: '"NIC.Slot Firmware Inventory" not in rollback_component_list'
  when: generation | int >= 17

- name: Fail if rollback version not available for iDRAC9 (generation < 17)
  block:
    - name: Prerequisite - Check if rollback version available for network components
      ansible.builtin.fail:
        msg: "Prerequisite not met. Rollback version not available for network components"
      when: network_components_rollback | length < 1
  when: generation | int < 17

- block:
    - name: Rollback component selection for idrac9
      block:
        - ansible.builtin.set_fact:
            rollback_components: "{{ rollback_component_list | intersect(nic_comps) }}"

        - name: Fallback to FC rollback components if NIC not available
          ansible.builtin.set_fact:
            rollback_components: "{{ rollback_component_list | intersect(fc_comps) }}"
          when: rollback_components | length < 1

        - name: Extract component regex
          ansible.builtin.set_fact:
            comp_regex: "{{ rollback_components[0].split(' ')[0] }}"
          when: rollback_components | length > 0

        - ansible.builtin.set_fact:
            split_by: "{{ comp_regex | regex_findall('\\W') }}"

        - ansible.builtin.set_fact:
            comp_regex: "{{ (comp_regex.split(split_by[0])[0] + '.*') if
              (split_by | length > 0) else (comp_regex  + '.*') }}"

        - ansible.builtin.include_tasks: _get_firmware_inventory.yml
          vars:
            components_list: "{{ rollback_components }}"

        - ansible.builtin.set_fact:
            rollback_to_version_list: "{{ previous_versions }}"

        - name: Rollback an network component firmware with reboot as true
            (Check mode - changes expected)
          redfish_firmware_rollback: &redfish_firmware_rollback_9
            name: "{{ comp_regex }}"
            reboot_timeout: 3600
            timeout: 300
          register: result
          check_mode: true

        - name: Verify task status - Rollback an network component firmware
            with reboot as true (Check mode - changes expected)
          ansible.builtin.assert:
            that:
              - result.changed
              - result.msg == "Changes found to be applied."

        - name: Rollback an network component firmware with reboot as true
            (Normal mode)
          dellemc.openmanage.redfish_firmware_rollback:
            <<: *redfish_firmware_rollback_9
          register: result
      when: generation | int < 17

    - name: Rollback component selection for iDRAC10
      block:
        - name: Include firmware inventory task
          ansible.builtin.include_tasks: _get_firmware_inventory.yml
          vars:
            components_list: "{{ rollback_components }}"

        - name: Set rollback version list
          ansible.builtin.set_fact:
            rollback_to_version_list: "{{ previous_versions }}"

        - name: Rollback an network component firmware with reboot as true
            (Check mode - changes expected)
          redfish_firmware_rollback: &redfish_firmware_rollback_10
            name: "{{ rollback_components }}"
            reboot_timeout: 3600
            timeout: 300
          register: result
          check_mode: true

        - name: Verify task status - Rollback an network component firmware
            with reboot as true (Check mode - changes expected)
          ansible.builtin.assert:
            that:
              - result.changed
              - result.msg == "Changes found to be applied."

        - name: Rollback an network component firmware with reboot as true
            (Normal mode)
          dellemc.openmanage.redfish_firmware_rollback:
            <<: *redfish_firmware_rollback_10
          register: result

      when: generation | int >= 17

    - ansible.builtin.set_fact:
        job_list: "{{ job_list | default([]) + [item.Id] }}"
      loop: "{{ result.job_status }}"

    - ansible.builtin.include_tasks: _get_job_details.yml
      vars:
        job_id: "{{ item }}"
      with_items: "{{ job_list }}"

    - wait_for: timeout=10

    - ansible.builtin.include_tasks: _get_firmware_inventory.yml
      vars:
        components_list: "{{ rollback_components }}"

    - ansible.builtin.set_fact:
        module_job_status: "{{ result.job_status | ansible.utils.remove_keys(
          target=['ActualRunningStopTime', 'ActualRunningStartTime'],
          matching_parameter='regex') }}"

    - ansible.builtin.include_tasks: _assert_job_status.yml

    - name: Verify task status - Rollback an network component firmware
        with reboot as true (Normal mode)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Successfully completed the job for firmware
            rollback."
          - installed_versions | sort == rollback_to_version_list | sort

  module_defaults:
    dellemc.openmanage.redfish_firmware_rollback:
      baseuri: "{{ idrac_ip }}"
      username: "{{ idrac_user }}"
      password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
