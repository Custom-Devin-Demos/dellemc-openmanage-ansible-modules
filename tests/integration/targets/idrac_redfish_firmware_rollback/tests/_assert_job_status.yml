---
- block:
    - name: Sort dictionary keys
      set_fact:
        sorted_uri_job_status: "{{ uri_job_status[0] | dictsort }}"
        sorted_module_job_status: "{{ module_job_status[0] | dictsort }}"

    - name: Compare job_detailed_status from task and uri
      ansible.utils.fact_diff:
        before: "{{ sorted_uri_job_status }}"
        after: "{{ sorted_module_job_status }}"
      register: diff_result

    - name: Verify task status - Compare job_status from task and uri
      ansible.builtin.assert:
        that:
          - not diff_result.changed
          - not diff_result.diff_lines
