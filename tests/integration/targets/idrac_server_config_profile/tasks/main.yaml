---
- name: SCP main task block
  module_defaults:
    dellemc.openmanage.idrac_server_config_profile:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      idrac_port: "{{ idrac_port }}"
      validate_certs: "{{ validate_certs }}"
    dellemc.openmanage.idrac_user:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      idrac_port: "{{ idrac_port }}"
      validate_certs: "{{ validate_certs }}"
    ansible.builtin.uri:
      user: "{{ idrac_user }}"
      password: "{{ idrac_password }}"
      force_basic_auth: true
      validate_certs: false
      return_content: true
  vars:
    extra_scp_components:
      - "FC"
      - "InfiniBand"
      - "SupportAssist"
      - "EventFilters"
      - "System"
      - "LifecycleController"
      - "AHCI"
      - "PCIeSSD"
  block:
    - name: Collect all test cases
      ansible.builtin.find:
        paths: "{{ role_path }}/tests"
        patterns: "{{ testcase }}.yaml"
        use_regex: true
      register: test_cases
      delegate_to: localhost

    - name: Set mount paths to save time
      ansible.builtin.set_fact:
        nfs_share_mnt: "{{ lookup('env', 'HOME') }}/nfs"
        cifs_share_mnt: "{{ lookup('env', 'HOME') }}/cifs"
      when: nfs_share_mnt is not defined and cifs_share_mnt is not defined

    - name: Set test_items
      ansible.builtin.set_fact:
        test_items: "{{ test_cases.files | map(attribute='path') | list }}"

    - name: Fail if no test cases are found as per pattern.
      ansible.builtin.fail:
        msg: "Could not find test cases to run!!!"
      when: not test_items|length > 0

    - name: Run test case
      ansible.builtin.include_tasks:
        file: "{{ test_case_to_run }}"
      with_items: "{{ test_items }}"
      loop_control:
        loop_var: test_case_to_run
