---
- name: Get data using uri
  ansible.builtin.uri:
    url: "{{ url }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    force_basic_auth: true
    method: GET
    body: {}
    validate_certs: false
    body_format: json
    return_content: true
    status_code: 200
    headers: 'Accept=application/json'
  register: fetched_data
