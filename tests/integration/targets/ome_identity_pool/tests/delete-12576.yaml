---
- name: Test that we have an OME host, OME username and OME password
  ansible.builtin.fail:
    msg: 'Please define the following variables: hostname, username
      and password.'
  when: hostname is not defined or username is not defined or
    password is not defined

- block:
    - name: Pre-req - Create an identity pool using ethernet, FCoE,
        iSCSI and FC settings
      dellemc.openmanage.ome_identity_pool:
        pool_name: "omam_test_identity_pool"
        pool_description: "Identity pool with Ethernet, FCoE, iSCSI and
          FC settings"
        ethernet_settings:
          starting_mac_address: "50:50:50:50:50:00"
          identity_count: 60
        fcoe_settings:
          starting_mac_address: "70:70:70:70:70:00"
          identity_count: 75
        iscsi_settings:
          starting_mac_address: "60:60:60:60:60:00"
          identity_count: 30
          initiator_config:
            iqn_prefix: "iqn.2025-07.com.example:storage-system"
          initiator_ip_pool_settings:
            ip_range: "10.33.0.1-10.33.0.255"
            subnet_mask: "255.255.255.0"
            gateway: "192.168.4.1"
            primary_dns_server: "10.8.8.8"
            secondary_dns_server: "8.8.8.8"
        fc_settings:
          starting_address: "30:30:30:30:30:00"
          identity_count: 45

    - name: Delete identity pool. (Check mode - changes expected)
      dellemc.openmanage.ome_identity_pool: &delete
        state: absent
        pool_name: "omam_test_identity_pool"
      register: cm_changes
      check_mode: true

    - name: Delete identity pool. (Normal mode)
      dellemc.openmanage.ome_identity_pool:
        <<: *delete
      register: result

    - name: Delete identity pool. (Check mode - no changes expected)
      dellemc.openmanage.ome_identity_pool:
        <<: *delete
      register: cm_no_changes
      check_mode: true

    - name: Delete identity pool. (Idempotence mode)
      dellemc.openmanage.ome_identity_pool:
        <<: *delete
      register: idempotence

    - name: Verify the status of tasks
      ansible.builtin.assert:
        that:
          - result.changed and result.msg ==
            "Successfully deleted the identity pool."
          - not idempotence.changed and idempotence.msg ==
            "The identity pool 'omam_test_identity_pool' is not present in the
            system."

  module_defaults:
    dellemc.openmanage.ome_identity_pool:
      validate_certs: "{{ validate_certs }}"
      hostname: "{{ hostname }}"
      username: "{{ username }}"
      password: "{{ password }}"
      port: "{{ port }}"
