---
- name: Test that we have an OME host, OME username and OME password
  ansible.builtin.fail:
    msg: 'Please define the following variables: hostname, username
      and password.'
  when: hostname is not defined or username is not defined or
    password is not defined

- block:
    - name: Create an identity pool with invalid ethernet mac address
        (Negative)
      dellemc.openmanage.ome_identity_pool: &negative
        pool_name: "omam_test_identity_pool"
        pool_description: "Identity pool with Ethernet, FCoE, iSCSI
          and FC settings"
        ethernet_settings:
          starting_mac_address: "50:50:50:50:50,00"
          identity_count: 60
        fcoe_settings:
          starting_mac_address: "70:70:70:70:70:00"
          identity_count: 75
        iscsi_settings:
          starting_mac_address: "60:60:60:60:60:00"
          identity_count: 30
          initiator_config:
            iqn_prefix: "iqn.2025-07.com.example:storage-system"
          initiator_ip_pool_settings:
            ip_range: "10.33.0.1-10.33.0.255"
            subnet_mask: "255.255.255.0"
            gateway: "192.168.4.1"
            primary_dns_server: "10.8.8.8"
            secondary_dns_server: "8.8.8.8"
        fc_settings:
          starting_address: "30:30:30:30:30:00"
          identity_count: 45
      ignore_errors: true
      register: invalid_1

    - name: Create an identity pool with invalid fcoe mac address (Negative)
      dellemc.openmanage.ome_identity_pool:
        pool_name: "omam_test_identity_pool"
        pool_description: "Identity pool with Ethernet, FCoE, iSCSI
          and FC settings"
        fcoe_settings:
          starting_mac_address: "70:70:70:70:70/00"
          identity_count: 75
      ignore_errors: true
      register: invalid_2

    - name: Create an identity pool with invalid iscsi mac address (Negative)
      dellemc.openmanage.ome_identity_pool:
        pool_name: "omam_test_identity_pool"
        pool_description: "Identity pool with Ethernet, FCoE, iSCSI and
          FC settings"
        iscsi_settings:
          starting_mac_address: "60:60:60:60:6000"
          identity_count: 30
          initiator_config:
            iqn_prefix: "iqn.myprefix."
          initiator_ip_pool_settings:
            ip_range: "10.33.0.1-10.33.0.255"
            subnet_mask: "255.255.255.0"
            gateway: "192.168.4.1"
            primary_dns_server: "10.8.8.8"
            secondary_dns_server: "8.8.8.8"
      ignore_errors: true
      register: invalid_3

    - name: Create an identity pool with invalid fc mac address (Negative)
      dellemc.openmanage.ome_identity_pool:
        pool_name: "omam_test_identity_pool"
        pool_description: "Identity pool with Ethernet, FCoE, iSCSI and
          FC settings"
        fc_settings:
          starting_address: "30:30:3030:30:00"
          identity_count: 45
      ignore_errors: true
      register: invalid_4

    - name: Delete identity pool on unreachable host (Negative)
      dellemc.openmanage.ome_identity_pool:
        hostname: "999.999.999.999"
        state: absent
        pool_name: "omam_test_identity_pool"
      ignore_unreachable: true
      ignore_errors: true
      register: invalid_unreachable

    - name: Verify status of tasks
      ansible.builtin.assert:
        that:
          - invalid_1.failed and invalid_1.msg ==
            "Please provide the valid MAC address format for
            Ethernet settings."
          - invalid_2.failed and invalid_2.msg ==
            "Please provide the valid MAC address format for Fcoe settings."
          - invalid_3.failed and invalid_3.msg ==
            "Please provide the valid MAC address format for Iscsi settings."
          - invalid_4.failed and invalid_4.msg ==
            "Please provide the valid starting address format for FC
            settings."
          - invalid_unreachable.unreachable

  module_defaults:
    dellemc.openmanage.ome_identity_pool:
      validate_certs: "{{ validate_certs }}"
      hostname: "{{ hostname }}"
      username: "{{ username }}"
      password: "{{ password }}"
      port: "{{ port }}"
