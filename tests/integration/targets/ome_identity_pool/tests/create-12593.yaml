---
- name: Test that we have an OME host, OME username and OME password
  ansible.builtin.fail:
    msg: 'Please define the following variables: hostname, username and
      password.'
  when: hostname is not defined or username is not defined or
    password is not defined

- block:
    - name: Delete identity pool
      dellemc.openmanage.ome_identity_pool:
        state: absent
        pool_name: "omam_test_identity_pool"

    - name: Create an identity pool using ethernet, FCoE, iSCSI and FC settings
       (check mode - changes expected)
      dellemc.openmanage.ome_identity_pool: &create
        pool_name: "omam_test_identity_pool"
        pool_description: "Identity pool with Ethernet, FCoE, iSCSI and
          FC settings"
        ethernet_settings:
          starting_mac_address: "50:50:50:50:50:00"
          identity_count: 60
        fcoe_settings:
          starting_mac_address: "70:70:70:70:70:00"
          identity_count: 75
        iscsi_settings:
          starting_mac_address: "60:60:60:60:60:00"
          identity_count: 30
          initiator_config:
            iqn_prefix: "iqn.2025-07.com.example:storage-system"
          initiator_ip_pool_settings:
            ip_range: "10.33.0.1-10.33.0.255"
            subnet_mask: "255.255.255.0"
            gateway: "192.168.4.1"
            primary_dns_server: "10.8.8.8"
            secondary_dns_server: "8.8.8.8"
        fc_settings:
          starting_address: "30:30:30:30:30:00"
          identity_count: 45
      register: cm_changes
      check_mode: true

    - name: Create an identity pool using ethernet, FCoE, iSCSI and FC settings
      dellemc.openmanage.ome_identity_pool:
        <<: *create
      register: result

    - name: Create an identity pool using ethernet, FCoE, iSCSI and FC settings
      dellemc.openmanage.ome_identity_pool:
        <<: *create
      register: cm_no_changes
      check_mode: true

    - name: Create an identity pool using ethernet, FCoE, iSCSI and FC settings
      dellemc.openmanage.ome_identity_pool:
        <<: *create
      register: idempotence

    - name: Verify the status of tasks
      ansible.builtin.assert:
        that:
          - cm_changes.changed and cm_changes.msg ==
            "Changes found to be applied."
          - result.changed and result.msg ==
            "Successfully created an identity pool."
          - not cm_no_changes.changed and cm_no_changes.msg ==
            "No changes found to be applied."
          - not idempotence.changed and
            "No changes found to be applied." in idempotence.msg

    - name: Create an identity pool using only ethernet settings
      dellemc.openmanage.ome_identity_pool:
        pool_name: "pool2"
        pool_description: "Identity pool with ethernet"
        ethernet_settings:
          starting_mac_address: "aa-ee-cc-ed-ee-ea"
          identity_count: 47
      register: ip_ethernet

    - name: Create an identity pool using only iSCSI settings
      dellemc.openmanage.ome_identity_pool:
        pool_name: "pool3"
        pool_description: "Identity pool with iscsi"
        iscsi_settings:
          starting_mac_address: "10:11:12:14:16:18"
          identity_count: 25
          initiator_config:
            iqn_prefix: "iqn.2025-17.com.example:storage-system"
          initiator_ip_pool_settings:
            ip_range: "20.31.0.1-20.31.0.255"
            subnet_mask: "255.255.255.0"
            gateway: "192.168.4.1"
            primary_dns_server: "10.8.8.8"
            secondary_dns_server: "8.8.8.8"
      register: ip_iscsi

    - name: Verify the status of tasks for isci and ethernet pool
      ansible.builtin.assert:
        that:
          - ip_iscsi.changed and ip_ethernet.changed
          - ip_iscsi.msg == ip_ethernet.msg ==
            "Successfully created an identity pool."

  always:
    - name: Delete identity pools.
      dellemc.openmanage.ome_identity_pool:
        state: absent
        pool_name: "{{ item }}"
      loop:
        - "pool2"
        - "pool3"

  module_defaults:
    dellemc.openmanage.ome_identity_pool:
      validate_certs: "{{ validate_certs }}"
      hostname: "{{ hostname }}"
      username: "{{ username }}"
      password: "{{ password }}"
      port: "{{ port }}"
